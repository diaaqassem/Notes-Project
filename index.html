<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Cloud | Appwrite Database</title>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0/dist/umd/sdk.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }
    
    body {
      background: #0a0c12;
      color: #edf2f7;
      min-height: 100vh;
    }
    
    /* Dark Theme */
    :root {
      --bg-primary: #0a0c12;
      --bg-secondary: #11131c;
      --card-bg: #0f1119;
      --accent: #6366f1;
      --accent-dark: #4f46e5;
      --danger: #f87171;
      --success: #4ade80;
      --border: #1e293b;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Auth Card */
    .auth-card {
      max-width: 420px;
      margin: 100px auto;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    
    .auth-card h2 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .auth-card p {
      color: #94a3b8;
      margin-bottom: 24px;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      background: #1e293b;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: #334155;
    }
    
    .btn-danger {
      background: var(--danger);
    }
    
    /* Main App */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-secondary);
      padding: 8px 20px;
      border-radius: 40px;
    }
    
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .task-item {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s;
    }
    
    .task-item:hover {
      transform: translateX(4px);
      border-left: 3px solid var(--accent);
    }
    
    .task-check {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    
    .task-content {
      flex: 1;
    }
    
    .task-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }
    
    .task-desc {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    
    .task-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
    }
    
    .badge {
      padding: 4px 8px;
      border-radius: 8px;
      background: #1e293b;
    }
    
    .priority-high { color: #f87171; }
    .priority-medium { color: #fbbf6b; }
    .priority-low { color: #4ade80; }
    
    .progress-bar {
      background: #1e293b;
      height: 8px;
      border-radius: 10px;
      overflow: hidden;
      margin: 16px 0;
    }
    
    .progress-fill {
      background: var(--accent);
      height: 100%;
      transition: width 0.3s;
    }
    
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .form-row input, .form-row select {
      flex: 1;
    }
    
    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
    }
    
    .success-msg {
      color: var(--success);
      font-size: 13px;
      margin-top: 8px;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }
      .header {
        flex-direction: column;
        gap: 12px;
      }
      .task-item {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  // Appwrite Configuration
  const APPWRITE_ENDPOINT = "https://fra.cloud.appwrite.io/v1";
  const APPWRITE_PROJECT_ID = "69cc903d0017f5082b8a";
  const APPWRITE_DATABASE_ID = "taskflow_db";
  const APPWRITE_COLLECTION_ID = "tasks";
  
  // Initialize Appwrite
  const client = new Appwrite.Client();
  const account = new Appwrite.Account(client);
  const databases = new Appwrite.Databases(client);
  
  client
    .setEndpoint(APPWRITE_ENDPOINT)
    .setProject(APPWRITE_PROJECT_ID);
  
  let currentUser = null;
  let tasks = [];
  let currentFilter = "all";
  let searchQuery = "";
  
  // Render App
  function renderApp() {
    if (!currentUser) {
      renderAuth();
    } else {
      renderMainApp();
    }
  }
  
  function renderAuth() {
    const appDiv = document.getElementById("app");
    appDiv.innerHTML = `
      <div class="auth-card">
        <h2>📝 TaskFlow Cloud</h2>
        <p>Your tasks, synced across all devices with Appwrite</p>
        
        <div id="authForm">
          <input type="email" id="email" placeholder="Email address">
          <input type="password" id="password" placeholder="Password">
          <div id="authError" class="error-msg"></div>
          <button onclick="handleLogin()" style="width: 100%; margin-bottom: 12px;">Login</button>
          <button onclick="handleSignup()" class="btn-secondary" style="width: 100%;">Create Account</button>
        </div>
        
        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid #1e293b;">
          <p style="font-size: 12px; text-align: center; color: #64748b;">
            ⚡ Make sure you've added Web Platform in Appwrite Console<br>
            Hostname: localhost (for testing) or your Netlify URL
          </p>
        </div>
      </div>
    `;
  }
  
  async function handleLogin() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("authError");
    
    try {
      await account.createEmailSession(email, password);
      currentUser = await account.get();
      await loadTasks();
      renderApp();
    } catch(e) {
      errorDiv.innerText = `Login failed: ${e.message}`;
      if (e.message.includes("not a valid platform")) {
        errorDiv.innerText += "\n\n⚠️ Add Web Platform in Appwrite Console with hostname: localhost";
      }
    }
  }
  
  async function handleSignup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("authError");
    
    if (password.length < 8) {
      errorDiv.innerText = "Password must be at least 8 characters";
      return;
    }
    
    try {
      await account.create('unique()', email, password, email.split('@')[0]);
      await handleLogin();
    } catch(e) {
      errorDiv.innerText = `Signup failed: ${e.message}`;
    }
  }
  
  async function handleLogout() {
    await account.deleteSession('current');
    currentUser = null;
    tasks = [];
    renderApp();
  }
  
  async function loadTasks() {
    try {
      const response = await databases.listDocuments(
        APPWRITE_DATABASE_ID,
        APPWRITE_COLLECTION_ID,
        [
          Appwrite.Query.equal('userId', currentUser.$id),
          Appwrite.Query.orderDesc('$createdAt')
        ]
      );
      tasks = response.documents;
      renderTasks();
    } catch(e) {
      console.error("Error loading tasks:", e);
      showError("Failed to load tasks. Make sure database and collection exist.");
    }
  }
  
  async function addTask() {
    const title = document.getElementById("taskTitle")?.value;
    if (!title) return alert("Please enter a task title");
    
    const description = document.getElementById("taskDesc")?.value || "";
    const category = document.getElementById("taskCategory")?.value || "Work";
    const priority = document.getElementById("taskPriority")?.value || "Medium";
    const dueDate = document.getElementById("taskDueDate")?.value || "";
    
    try {
      await databases.createDocument(
        APPWRITE_DATABASE_ID,
        APPWRITE_COLLECTION_ID,
        'unique()',
        {
          title,
          description,
          category,
          priority,
          dueDate,
          completed: false,
          pinned: false,
          userId: currentUser.$id
        }
      );
      
      document.getElementById("taskTitle").value = "";
      document.getElementById("taskDesc").value = "";
      document.getElementById("taskDueDate").value = "";
      
      await loadTasks();
    } catch(e) {
      alert("Error adding task: " + e.message);
    }
  }
  
  async function toggleTask(taskId, completed) {
    try {
      await databases.updateDocument(
        APPWRITE_DATABASE_ID,
        APPWRITE_COLLECTION_ID,
        taskId,
        { completed }
      );
      await loadTasks();
    } catch(e) {
      alert("Error updating task: " + e.message);
    }
  }
  
  async function deleteTask(taskId) {
    if (!confirm("Delete this task?")) return;
    try {
      await databases.deleteDocument(
        APPWRITE_DATABASE_ID,
        APPWRITE_COLLECTION_ID,
        taskId
      );
      await loadTasks();
    } catch(e) {
      alert("Error deleting task: " + e.message);
    }
  }
  
  async function clearCompleted() {
    const completedTasks = tasks.filter(t => t.completed);
    if (completedTasks.length === 0) return;
    
    for (let task of completedTasks) {
      await databases.deleteDocument(
        APPWRITE_DATABASE_ID,
        APPWRITE_COLLECTION_ID,
        task.$id
      );
    }
    await loadTasks();
  }
  
  async function clearAll() {
    if (!confirm("⚠️ Delete ALL tasks permanently? This cannot be undone!")) return;
    
    for (let task of tasks) {
      await databases.deleteDocument(
        APPWRITE_DATABASE_ID,
        APPWRITE_COLLECTION_ID,
        task.$id
      );
    }
    await loadTasks();
  }
  
  function renderTasks() {
    const tasksContainer = document.getElementById("tasksContainer");
    if (!tasksContainer) return;
    
    let filtered = tasks.filter(task => {
      if (currentFilter === "completed" && !task.completed) return false;
      if (currentFilter === "pending" && task.completed) return false;
      if (searchQuery && !task.title.toLowerCase().includes(searchQuery.toLowerCase())) return false;
      return true;
    });
    
    if (filtered.length === 0) {
      tasksContainer.innerHTML = `
        <div style="text-align: center; padding: 40px; color: #64748b;">
          <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px;"></i>
          <p>No tasks found. Add your first task!</p>
        </div>
      `;
      return;
    }
    
    tasksContainer.innerHTML = filtered.map(task => `
      <div class="task-item">
        <input type="checkbox" class="task-check" ${task.completed ? "checked" : ""} 
               onchange="toggleTask('${task.$id}', this.checked)">
        <div class="task-content">
          <div class="task-title" style="${task.completed ? 'text-decoration: line-through; opacity: 0.7' : ''}">
            ${escapeHtml(task.title)}
            ${task.pinned ? ' 📌' : ''}
          </div>
          ${task.description ? `<div class="task-desc">${escapeHtml(task.description)}</div>` : ''}
          <div class="task-meta">
            <span class="badge">🏷️ ${task.category}</span>
            <span class="badge priority-${task.priority.toLowerCase()}">⚡ ${task.priority}</span>
            <span class="badge">📅 ${task.dueDate || "No date"}</span>
          </div>
        </div>
        <button onclick="deleteTask('${task.$id}')" class="btn-danger" style="padding: 8px 16px;">Delete</button>
      </div>
    `).join("");
    
    // Update progress
    const completedCount = tasks.filter(t => t.completed).length;
    const percent = tasks.length ? Math.round((completedCount / tasks.length) * 100) : 0;
    const progressFill = document.getElementById("progressFill");
    const progressPercent = document.getElementById("progressPercent");
    if (progressFill) progressFill.style.width = `${percent}%`;
    if (progressPercent) progressPercent.innerText = `${percent}% completed`;
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, (m) => {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;' };
      return map[m];
    });
  }
  
  function showError(msg) {
    const errorDiv = document.getElementById("errorMsg");
    if (errorDiv) {
      errorDiv.innerText = msg;
      setTimeout(() => { errorDiv.innerText = ""; }, 5000);
    }
  }
  
  function renderMainApp() {
    const completedCount = tasks.filter(t => t.completed).length;
    const percent = tasks.length ? Math.round((completedCount / tasks.length) * 100) : 0;
    
    const appDiv = document.getElementById("app");
    appDiv.innerHTML = `
      <div class="container">
        <div class="header">
          <div>
            <h1>📝 TaskFlow Cloud</h1>
            <p style="color: #94a3b8;">Connected to Appwrite Database</p>
          </div>
          <div class="user-info">
            <span>👤 ${escapeHtml(currentUser.email)}</span>
            <button onclick="handleLogout()" class="btn-secondary">Logout</button>
          </div>
        </div>
        
        <div class="card">
          <h3>➕ Add New Task</h3>
          <div class="form-row">
            <input type="text" id="taskTitle" placeholder="Task title *" style="flex: 2;">
            <select id="taskCategory">
              <option value="Study">📚 Study</option>
              <option value="Work">💼 Work</option>
              <option value="Personal">🏠 Personal</option>
            </select>
            <select id="taskPriority">
              <option value="High">🔴 High</option>
              <option value="Medium">🟡 Medium</option>
              <option value="Low">🟢 Low</option>
            </select>
            <input type="date" id="taskDueDate">
          </div>
          <textarea id="taskDesc" rows="2" placeholder="Description (optional)"></textarea>
          <button onclick="addTask()" style="margin-top: 12px;">➕ Add Task</button>
        </div>
        
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px;">
            <h3>📋 My Tasks (${tasks.length})</h3>
            <div style="display: flex; gap: 12px;">
              <input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="searchTasks()" style="margin-bottom: 0;">
              <select id="filterSelect" onchange="filterTasks()" style="margin-bottom: 0;">
                <option value="all">All</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>
          
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: ${percent}%"></div>
          </div>
          <div style="text-align: right; margin-bottom: 16px;">
            <span id="progressPercent">${percent}% completed</span>
          </div>
          
          <div id="tasksContainer"></div>
        </div>
        
        <div class="card" style="display: flex; gap: 12px; justify-content: center;">
          <button onclick="clearCompleted()" style="background: #f87171;">🗑️ Clear Completed</button>
          <button onclick="clearAll()" style="background: #f87171;">⚠️ Clear All Tasks</button>
        </div>
        
        <div id="errorMsg" class="error-msg" style="text-align: center; margin-top: 12px;"></div>
      </div>
    `;
    
    renderTasks();
  }
  
  // Filter functions
  window.filterTasks = function() {
    const select = document.getElementById("filterSelect");
    if (select) currentFilter = select.value;
    renderTasks();
  };
  
  window.searchTasks = function() {
    const input = document.getElementById("searchInput");
    if (input) searchQuery = input.value;
    renderTasks();
  };
  
  // Make functions globally available
  window.handleLogin = handleLogin;
  window.handleSignup = handleSignup;
  window.handleLogout = handleLogout;
  window.addTask = addTask;
  window.toggleTask = toggleTask;
  window.deleteTask = deleteTask;
  window.clearCompleted = clearCompleted;
  window.clearAll = clearAll;
  window.filterTasks = filterTasks;
  window.searchTasks = searchTasks;
  
  // Initialize
  async function init() {
    try {
      currentUser = await account.get();
      await loadTasks();
    } catch(e) {
      currentUser = null;
    }
    renderApp();
  }
  
  init();
</script>
</body>
</html>
