<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TaskFlow Pro</title>
  <link rel="icon" type="image/png" href="./head.png">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    /* Dark Theme - Pure Black */
    :root {
      --bg-primary: #000000;
      --bg-secondary: #000000;
      --bg-tertiary: #0a0a0a;
      --card-bg: #000000;
      --card-border: #1e2a3a;
      --text-primary: #edf2f7;
      --text-secondary: #fff;
      --text-muted: #6c7a8e;
      --input-bg: #0a0a0a;
      --input-border: #253040;
      --badge-bg: #17212b;
      --hover-bg: #1a1a1a;
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.8);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.9);
      --progress-bg: #1e2a3a;
      --priority-high: #f97373;
      --priority-medium: #fbbf6b;
      --priority-low: #6bdc9c;
      --accent: #6366f1;
      --accent-dark: #4f46e5;
      --danger: #f87171;
      --success: #4ade80;
      --pin-color: #facc15;
    }

    body {
      zoom: 1.15;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* Custom Black Scrollbar */
    .tasks-list::-webkit-scrollbar {
      width: 8px;
    }
    .tasks-list::-webkit-scrollbar-track {
      background: #000000;
      border-radius: 10px;
    }
    .tasks-list::-webkit-scrollbar-thumb {
      background: #1a1a1a;
      border-radius: 10px;
    }
    .tasks-list::-webkit-scrollbar-thumb:hover {
      background: #2a2a2a;
    }

    /* Modal Styles - Edit Card */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .edit-modal {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    .modal-overlay.active .edit-modal {
      transform: scale(1);
    }
    .edit-modal h3 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .edit-modal .modal-subtitle {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 24px;
    }
    .edit-modal input, 
    .edit-modal select, 
    .edit-modal textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 20px;
      padding: 14px 18px;
      margin-bottom: 16px;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .edit-modal input:focus, 
    .edit-modal select:focus, 
    .edit-modal textarea:focus {
      border-color: var(--accent);
    }
    .edit-modal textarea {
      resize: vertical;
      min-height: 80px;
    }
    .edit-image-section {
      margin: 16px 0;
    }
    .edit-image-section label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .edit-image-upload-area {
      background: var(--input-bg);
      border: 2px dashed var(--input-border);
      border-radius: 20px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .edit-image-upload-area:hover {
      border-color: var(--accent);
    }
    .edit-image-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }
    .edit-image-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--card-border);
    }
    .edit-image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .edit-remove-img {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-btn {
      background: var(--accent);
      border: none;
      color: white;
    }
    .save-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }
    .cancel-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-secondary);
    }
    .cancel-btn:hover {
      background: var(--hover-bg);
    }

    /* Auth Container */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #000000;
    }
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-md);
    }
    .auth-card h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .auth-card p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 28px;
    }
    .auth-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 48px;
      padding: 14px 20px;
      margin-bottom: 16px;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
    }
    .auth-input:focus {
      border-color: var(--accent);
    }
    .auth-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 48px;
      padding: 14px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }
    .auth-btn:hover {
      background: var(--accent-dark);
    }
    .switch-auth {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .switch-auth span {
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }
    .error-msg {
      color: var(--danger);
      font-size: 0.75rem;
      margin-top: -12px;
      margin-bottom: 12px;
    }

    /* Main App */
    .app-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 20px;
      display: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
      gap: 16px;
    }
    .title-section h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .title-section p {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 6px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-tertiary);
      padding: 8px 20px;
      border-radius: 48px;
      border: 1px solid var(--card-border);
    }
    .user-email {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .logout-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .sync-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--success);
    }
    .dashboard {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
    }
    .sidebar {
      background: var(--bg-secondary);
      border-radius: 28px;
      padding: 22px;
      border: 1px solid var(--card-border);
      height: fit-content;
    }
    .filter-group {
      margin-bottom: 28px;
    }
    .filter-group h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }
    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .filter-chip {
      border: none;
      background: var(--badge-bg);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .filter-chip.active {
      background: var(--accent);
      color: white;
    }
    .progress-card {
      margin-top: 20px;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 16px;
    }
    .progress-bar {
      height: 8px;
      background: var(--progress-bg);
      border-radius: 20px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }
    .clear-all-btn {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border: 1px solid var(--danger);
      margin-top: 12px;
      width: 100%;
    }
    .backup-btn {
      background: var(--accent);
      color: white;
      margin-top: 20px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .backup-menu {
      margin-top: 12px;
      background: var(--bg-tertiary);
      border-radius: 16px;
      padding: 12px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .backup-menu.show {
      display: flex;
    }
    .backup-option {
      background: var(--badge-bg);
      border: none;
      padding: 10px;
      border-radius: 40px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.8rem;
      text-align: center;
    }
    .backup-option:hover {
      background: var(--accent);
      color: white;
    }
    .task-panel {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 24px;
      border: 1px solid var(--card-border);
    }
    .add-task-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
      background: var(--bg-secondary);
      padding: 20px;
      border-radius: 24px;
    }
    .add-task-form input, 
    .add-task-form select, 
    .add-task-form textarea {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 40px;
      padding: 12px 18px;
      color: var(--text-primary);
      outline: none;
      width: 100%;
    }
    .add-task-form textarea {
      border-radius: 20px;
      min-height: 60px;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .form-row select, 
    .form-row input[type="date"] {
      flex: 1;
      min-width: 120px;
    }
    .image-upload-area {
      background: var(--input-bg);
      border: 2px dashed var(--input-border);
      border-radius: 20px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .image-upload-area:hover {
      border-color: var(--accent);
      background: var(--hover-bg);
    }
    .image-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }
    .image-preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--card-border);
    }
    .image-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .remove-image-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 10px;
      cursor: pointer;
    }
    .btn-add {
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .search-sort {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 50px;
      padding: 8px 18px;
      flex: 2;
    }
    .search-box input {
      background: transparent;
      border: none;
      padding: 10px;
      width: 100%;
      color: var(--text-primary);
      outline: none;
    }
    .sort-select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 40px;
      padding: 0 20px;
      color: var(--text-primary);
    }
    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 68vh;
      overflow-y: auto;
      padding-right: 8px;
    }
    .task-item {
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid var(--card-border);
      transition: all 0.2s;
    }
    .task-item:hover {
      transform: translateX(4px);
      border-left-color: var(--accent);
    }
    .task-item.pinned {
      border-left: 5px solid var(--pin-color);
    }
    .task-item.completed-task {
      opacity: 0.75;
    }
    .task-row-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }
    .task-check {
      width: 22px;
      height: 22px;
      appearance: none;
      background: var(--input-bg);
      border: 2px solid var(--accent);
      border-radius: 50%;
      cursor: pointer;
      margin-top: 2px;
      position: relative;
      flex-shrink: 0;
    }
    .task-check:checked {
      background: var(--accent);
    }
    .task-check:checked::after {
      content: "\f00c";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      font-size: 11px;
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .task-content {
      flex: 1;
    }
    .task-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
    }
    .task-title {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .completed-title {
      text-decoration: line-through;
      opacity: 0.7;
    }
    .action- {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .action-btn-sm {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .action-btn-sm:hover {
      background: var(--hover-bg);
      color: var(--accent);
    }
    .pin-btn-sm.active {
      color: var(--pin-color);
    }
    .task-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: var(--input-bg);
      padding: 10px 14px;
      border-radius: 16px;
      margin-top: 8px;
      word-break: break-word;
      line-height: 1.5;
    }
    .task-images {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .task-image {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--card-border);
      transition: transform 0.2s;
    }
    .task-image:hover {
      transform: scale(1.05);
    }
    .task-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }
    .priority-badge {
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .priority-high { background: #f9737320; color: #f97373; }
    .priority-medium { background: #fbbf6b20; color: #fbbf6b; }
    .priority-low { background: #6bdc9c20; color: #6bdc9c; }
    .cat-badge {
      background: var(--badge-bg);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .due-date {
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .empty-msg {
      text-align: center;
      padding: 50px;
      color: var(--text-muted);
    }
    @media (max-width: 800px) {
      .task-meta {
        position: relative;
        left:35px;
        margin-top: 15px;
            }
      .dashboard {
        grid-template-columns: 1fr;
      }
      .form-row {
        flex-direction: column;
      }
      .task-header-row {
        flex-direction: column;
        align-items: flex-start;
      }
      .action-buttons-group {
        /* align-self: flex-end; */
        position: relative;
        left: 246px;
        top: -32px;
      }
    }
  </style>
</head>
<body>
  <!-- Login / Signup Container -->
  <div id="authContainer" class="auth-container">
    <div class="auth-card">
      <h2><i class="fas fa-cloud"></i></h2>
      <div id="authForm"></div>
    </div>
  </div>

  <!-- Edit Modal Card -->
  <div id="editModal" class="modal-overlay">
    <div class="edit-modal">
      <h3><i class="fas fa-edit"></i> Edit Task</h3>
      <p class="modal-subtitle">Update task details and images</p>
      <input type="text" id="editTaskId" hidden>
      <input type="text" id="editTitle" placeholder="Task title">
      <textarea id="editDescription" placeholder="Description (optional)"></textarea>
      <select id="editCategory"><option value="Study">Study</option><option value="Work">Work</option><option value="Personal">Personal</option></select>
      <select id="editPriority"><option value="High">High Priority</option><option value="Medium">Medium Priority</option><option value="Low">Low Priority</option></select>
      <input type="date" id="editDueDate">
      <div class="edit-image-section">
        <label><i class="fas fa-images"></i> Images</label>
        <div class="edit-image-upload-area" id="editImageUploadArea"><i class="fas fa-plus"></i> Add more images<br><small>PNG, JPG, GIF up to 5MB</small><input type="file" id="editImageInput" multiple accept="image/*" style="display: none;"></div>
        <div id="editImageGrid" class="edit-image-grid"></div>
      </div>
      <div class="modal-actions"><button class="cancel-btn" onclick="closeEditModal()"><i class="fas fa-times"></i> Cancel</button><button class="save-btn" onclick="saveEditTask()"><i class="fas fa-save"></i> Save Changes</button></div>
    </div>
  </div>

  <div id="lightbox" class="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src="" alt=""></div>

  <div id="appContainer" class="app-container">
    <div class="header"><div class="title-section"><h1><i class="fas fa-cloud"></i>  </h1></div><div class="user-info"><i class="fas fa-user-circle"></i><span id="userEmailDisplay" class="user-email"></span><button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
    <div class="dashboard"><div class="sidebar"><div class="filter-group"><h3><i class="fas fa-filter"></i> Status</h3><div class="filter-buttons" id="statusFilters"><button data-filter="all" class="filter-chip active">All</button><button data-filter="pending" class="filter-chip">Pending</button><button data-filter="completed" class="filter-chip">Completed</button></div></div><div class="filter-group"><h3><i class="fas fa-tags"></i> Categories</h3><div class="filter-buttons" id="categoryFilters"><button data-cat="All" class="filter-chip active">All</button><button data-cat="Study" class="filter-chip">Study</button><button data-cat="Work" class="filter-chip">Work</button><button data-cat="Personal" class="filter-chip">Personal</button></div></div><div class="progress-card"><h3><i class="fas fa-chart-simple"></i> Progress</h3><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><span id="progressPercent">0%</span> completed</div><button id="clearCompletedBtn" class="filter-chip clear-all-btn"><i class="fas fa-trash-alt"></i> Clear Completed</button><button id="clearAllBtn" class="filter-chip clear-all-btn" style="margin-top:10px;"><i class="fas fa-dumpster"></i> Clear All Tasks</button><button id="backupBtn" class="filter-chip backup-btn"><i class="fas fa-database"></i> Backup</button><div id="backupMenu" class="backup-menu"><button class="backup-option" onclick="exportData()"><i class="fas fa-download"></i> Export Data (JSON)</button><button class="backup-option" onclick="importData()"><i class="fas fa-upload"></i> Import Data</button><button class="backup-option" onclick="resetData()"><i class="fas fa-trash-alt"></i> Reset All Data</button></div><div class="sync-status" style="margin-top: 16px;"><i class="fas fa-check-circle"></i> <span id="syncStatusText">Synced to cloud</span></div></div>
      <div class="task-panel"><div class="add-task-form"><input type="text" id="taskTitle" placeholder="Task title ..."><textarea id="taskDesc" rows="2" placeholder="Description (details)"></textarea><div class="image-upload-area" id="imageUploadArea"><i class="fas fa-cloud-upload-alt"></i> Click to add images (multiple)<br><small>PNG, JPG, GIF up to 5MB each</small><input type="file" id="imageInput" multiple accept="image/*" style="display: none;"></div><div id="imagePreviewContainer" class="image-preview-grid"></div><div class="form-row"><select id="taskCategory"><option value="Study">Study</option><option value="Work">Work</option><option value="Personal">Personal</option></select><select id="taskPriority"><option value="High">High Priority</option><option value="Medium">Medium Priority</option><option value="Low">Low Priority</option></select><input type="date" id="taskDueDate"></div><button id="addTaskBtn" class="btn-add"><i class="fas fa-plus"></i> Add Task</button></div><div class="search-sort"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search tasks..."></div><select id="sortSelect" class="sort-select"><option value="date_asc">Due Date (earliest)</option><option value="date_desc">Due Date (latest)</option><option value="priority">Priority (High to Low)</option></select></div><div id="tasksContainer" class="tasks-list"><div class="empty-msg"><i class="fas fa-spinner fa-pulse"></i> Loading your tasks...</div></div></div></div></div>

  <script>
    let currentUser = null, tasks = [], currentStatusFilter = "all", currentCategoryFilter = "All", searchQuery = "", sortMode = "date_asc", currentEditTaskId = null, currentImageDataUrls = [], editImageDataUrls = [];
    const authContainer = document.getElementById("authContainer"), appContainer = document.getElementById("appContainer"), tasksContainer = document.getElementById("tasksContainer"), addBtn = document.getElementById("addTaskBtn"), searchInput = document.getElementById("searchInput"), sortSelect = document.getElementById("sortSelect"), clearCompletedBtn = document.getElementById("clearCompletedBtn"), clearAllBtn = document.getElementById("clearAllBtn"), progressFill = document.getElementById("progressFill"), progressPercent = document.getElementById("progressPercent"), logoutBtn = document.getElementById("logoutBtn"), userEmailDisplay = document.getElementById("userEmailDisplay"), syncStatusText = document.getElementById("syncStatusText"), editModal = document.getElementById("editModal"), backupBtn = document.getElementById("backupBtn"), backupMenu = document.getElementById("backupMenu"), imageInput = document.getElementById("imageInput"), imageUploadArea = document.getElementById("imageUploadArea"), imagePreviewContainer = document.getElementById("imagePreviewContainer"), editImageInput = document.getElementById("editImageInput"), editImageUploadArea = document.getElementById("editImageUploadArea"), editImageGrid = document.getElementById("editImageGrid");
    
    backupBtn.addEventListener("click", (e) => { e.stopPropagation(); backupMenu.classList.toggle("show"); });
    document.addEventListener("click", (e) => { if (!backupBtn.contains(e.target) && !backupMenu.contains(e.target)) backupMenu.classList.remove("show"); });
    imageUploadArea.addEventListener("click", () => imageInput.click());
    imageInput.addEventListener("change", (e) => { Array.from(e.target.files).forEach(file => { if(file.size <= 5*1024*1024) { const reader = new FileReader(); reader.onload = (ev) => { currentImageDataUrls.push(ev.target.result); updateImagePreview(); }; reader.readAsDataURL(file); } else alert("Image too large. Max 5MB"); }); imageInput.value = ""; });
    function updateImagePreview() { imagePreviewContainer.innerHTML = currentImageDataUrls.map((url, idx) => `<div class="image-preview-item"><img src="${url}"><button class="remove-image-btn" onclick="removeImage(${idx})"><i class="fas fa-times"></i></button></div>`).join(""); }
    window.removeImage = function(idx) { currentImageDataUrls.splice(idx,1); updateImagePreview(); };
    function clearImagePreview() { currentImageDataUrls = []; updateImagePreview(); }
    editImageUploadArea.addEventListener("click", () => editImageInput.click());
    editImageInput.addEventListener("change", (e) => { Array.from(e.target.files).forEach(file => { if(file.size <= 5*1024*1024) { const reader = new FileReader(); reader.onload = (ev) => { editImageDataUrls.push(ev.target.result); updateEditImagePreview(); }; reader.readAsDataURL(file); } else alert("Image too large. Max 5MB"); }); editImageInput.value = ""; });
    function updateEditImagePreview() { editImageGrid.innerHTML = editImageDataUrls.map((url, idx) => `<div class="edit-image-item"><img src="${url}"><button class="edit-remove-img" onclick="removeEditImage(${idx})"><i class="fas fa-times"></i></button></div>`).join(""); }
    window.removeEditImage = function(idx) { editImageDataUrls.splice(idx,1); updateEditImagePreview(); };
    function getStorageKeyForUser(email) { return `taskflow_pro_${email.replace(/[^a-zA-Z0-9]/g, '_')}`; }
    function saveUserTasks() { if(currentUser) { localStorage.setItem(getStorageKeyForUser(currentUser.email), JSON.stringify(tasks)); syncStatusText.innerHTML = '<i class="fas fa-check-circle"></i> Synced'; setTimeout(() => syncStatusText.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Cloud sync', 2000); } }
    function loadUserTasks() { if(currentUser) { const stored = localStorage.getItem(getStorageKeyForUser(currentUser.email)); if(stored) { tasks = JSON.parse(stored); tasks = tasks.map(t => ({ ...t, pinned: t.pinned || false, description: t.description || "", images: t.images || [], completed: t.completed || false })); } else { tasks = [{ id: Date.now()+1, title: "Welcome to TaskFlow Pro", description: "Add images and track progress!", category: "Work", priority: "High", dueDate: "2026-04-20", completed: false, pinned: true, images: [], createdAt: Date.now() }]; saveUserTasks(); } renderTasks(); updateProgressBar(); } }
    function updateProgressBar() { const total = tasks.length, completedCount = tasks.filter(t => t.completed === true).length, percent = total === 0 ? 0 : Math.round((completedCount / total) * 100); progressFill.style.width = `${percent}%`; progressPercent.innerText = `${percent}%`; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function toggleTaskCompletion(taskId, isChecked) { const task = tasks.find(t => t.id === taskId); if(task) { task.completed = isChecked; saveUserTasks(); renderTasks(); updateProgressBar(); } }
    function getFilteredSortedTasks() { let filtered = tasks.filter(t => { if(currentStatusFilter === "completed" && !t.completed) return false; if(currentStatusFilter === "pending" && t.completed) return false; if(currentCategoryFilter !== "All" && t.category !== currentCategoryFilter) return false; if(searchQuery.trim() && !t.title.toLowerCase().includes(searchQuery.toLowerCase())) return false; return true; }); if(sortMode === "date_asc") filtered.sort((a,b) => (a.dueDate || "9999-12-31").localeCompare(b.dueDate || "9999-12-31")); else if(sortMode === "date_desc") filtered.sort((a,b) => (b.dueDate || "9999-12-31").localeCompare(a.dueDate || "9999-12-31")); else if(sortMode === "priority") { const order = { "High":1, "Medium":2, "Low":3 }; filtered.sort((a,b) => (order[a.priority]||3) - (order[b.priority]||3)); } filtered.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0)); return filtered; }
    function renderTasks() { const filtered = getFilteredSortedTasks(); if(filtered.length === 0) { tasksContainer.innerHTML = `<div class="empty-msg"><i class="fas fa-inbox"></i> No tasks found. Add your first task!</div>`; return; } tasksContainer.innerHTML = filtered.map(task => `<div class="task-item ${task.pinned ? 'pinned' : ''} ${task.completed ? 'completed-task' : ''}" data-id="${task.id}"><div class="task-row-top"><input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} data-id="${task.id}"><div class="task-content"><div class="task-header-row"><div class="task-title"><span class="${task.completed ? 'completed-title' : ''}">${escapeHtml(task.title)}</span>${task.pinned ? '<i class="fas fa-thumbtack" style="color:#facc15;"></i>' : ''}</div><div class="action-buttons-group"><button class="action-btn-sm pin-btn-sm ${task.pinned ? 'active' : ''}" data-id="${task.id}" data-action="pin"><i class="fas fa-thumbtack"></i> Pin</button><button class="action-btn-sm" data-id="${task.id}" data-action="edit"><i class="fas fa-edit"></i> Edit</button><button class="action-btn-sm" data-id="${task.id}" data-action="delete"><i class="fas fa-trash"></i> Delete</button></div></div><div class="task-meta"><span class="priority-badge priority-${task.priority.toLowerCase()}">${task.priority === 'High' ? '🔴' : task.priority === 'Medium' ? '🟡' : '🟢'} ${task.priority}</span><span class="cat-badge"><i class="fas fa-folder"></i> ${task.category}</span><span class="due-date"><i class="far fa-calendar-alt"></i> ${task.dueDate || 'No date'}</span></div></div></div>${task.description ? `<div class="task-desc">${escapeHtml(task.description)}</div>` : ''}${task.images && task.images.length ? `<div class="task-images">${task.images.map(img => `<div class="task-image" onclick="openLightbox('${img.replace(/'/g, "\\'")}')"><img src="${img}" alt="task image"></div>`).join('')}</div>` : ''}</div>`).join(""); attachTaskEvents(); }
    function attachTaskEvents() { document.querySelectorAll('.task-check').forEach(cb => { cb.removeEventListener('change', handleCheckboxChange); cb.addEventListener('change', handleCheckboxChange); }); document.querySelectorAll('[data-action="delete"]').forEach(btn => btn.addEventListener('click', handleDeleteClick)); document.querySelectorAll('[data-action="pin"]').forEach(btn => btn.addEventListener('click', handlePinClick)); document.querySelectorAll('[data-action="edit"]').forEach(btn => btn.addEventListener('click', handleEditClick)); }
    function handleCheckboxChange(e) { toggleTaskCompletion(parseInt(e.currentTarget.dataset.id), e.currentTarget.checked); }
    function handleDeleteClick(e) { const id = parseInt(e.currentTarget.dataset.id); if(confirm("Delete this task?")) { tasks = tasks.filter(t => t.id !== id); saveUserTasks(); renderTasks(); updateProgressBar(); } }
    function handlePinClick(e) { const id = parseInt(e.currentTarget.dataset.id); const task = tasks.find(t => t.id === id); if(task) { task.pinned = !task.pinned; saveUserTasks(); renderTasks(); } }
    function handleEditClick(e) { openEditModal(parseInt(e.currentTarget.dataset.id)); }
    function addNewTask() { const title = document.getElementById("taskTitle").value.trim(); if(!title) return alert("Enter task title"); tasks.push({ id: Date.now(), title, description: document.getElementById("taskDesc").value.trim(), category: document.getElementById("taskCategory").value, priority: document.getElementById("taskPriority").value, dueDate: document.getElementById("taskDueDate").value, completed: false, pinned: false, images: [...currentImageDataUrls], createdAt: Date.now() }); document.getElementById("taskTitle").value = ""; document.getElementById("taskDesc").value = ""; document.getElementById("taskDueDate").value = ""; clearImagePreview(); saveUserTasks(); renderTasks(); updateProgressBar(); }
    function openEditModal(taskId) { const task = tasks.find(t => t.id === taskId); if(!task) return; currentEditTaskId = taskId; document.getElementById("editTaskId").value = taskId; document.getElementById("editTitle").value = task.title; document.getElementById("editDescription").value = task.description || ""; document.getElementById("editCategory").value = task.category; document.getElementById("editPriority").value = task.priority; document.getElementById("editDueDate").value = task.dueDate || ""; editImageDataUrls = [...(task.images || [])]; updateEditImagePreview(); editModal.classList.add("active"); }
    function closeEditModal() { editModal.classList.remove("active"); currentEditTaskId = null; editImageDataUrls = []; }
    function saveEditTask() { const task = tasks.find(t => t.id === currentEditTaskId); if(task) { task.title = document.getElementById("editTitle").value.trim(); if(!task.title) return alert("Task title cannot be empty"); task.description = document.getElementById("editDescription").value; task.category = document.getElementById("editCategory").value; task.priority = document.getElementById("editPriority").value; task.dueDate = document.getElementById("editDueDate").value; task.images = [...editImageDataUrls]; saveUserTasks(); renderTasks(); updateProgressBar(); closeEditModal(); } }
    editModal.addEventListener("click", (e) => { if(e.target === editModal) closeEditModal(); });
    document.addEventListener("keydown", (e) => { if(e.key === "Escape" && editModal.classList.contains("active")) closeEditModal(); });
    window.openLightbox = function(imgSrc) { document.getElementById("lightboxImg").src = imgSrc; document.getElementById("lightbox").classList.add("active"); };
    window.closeLightbox = function() { document.getElementById("lightbox").classList.remove("active"); };
    window.exportData = function() { const dataStr = JSON.stringify({ version:"1.0", exportDate:new Date().toISOString(), user:currentUser.email, tasks }, null, 2); const blob = new Blob([dataStr], {type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `taskflow_backup_${currentUser.email}_${Date.now()}.json`; a.click(); URL.revokeObjectURL(a.href); syncStatusText.innerHTML = '<i class="fas fa-download"></i> Export complete'; setTimeout(() => syncStatusText.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Cloud sync', 2000); backupMenu.classList.remove("show"); };
    window.importData = function() { const input = document.createElement("input"); input.type = "file"; input.accept = "application/json"; input.onchange = (e) => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = (ev) => { try { const imported = JSON.parse(ev.target.result); if(imported.tasks && Array.isArray(imported.tasks)) { tasks = imported.tasks.map(t => ({ ...t, id: Date.now() + Math.random(), images: t.images || [], completed: t.completed || false })); saveUserTasks(); renderTasks(); updateProgressBar(); syncStatusText.innerHTML = '<i class="fas fa-check-circle"></i> Import successful'; setTimeout(() => syncStatusText.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Cloud sync', 2000); } else alert("Invalid backup file format"); } catch(err) { alert("Error importing file"); } }; reader.readAsText(file); }; input.click(); backupMenu.classList.remove("show"); };
    window.resetData = function() { if(confirm(" WARNING: This will delete ALL your tasks. This action cannot be undone. Continue?")) { tasks = []; saveUserTasks(); renderTasks(); updateProgressBar(); syncStatusText.innerHTML = '<i class="fas fa-trash"></i> All tasks cleared'; setTimeout(() => syncStatusText.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Cloud sync', 2000); } backupMenu.classList.remove("show"); };
    function initFilters() { document.querySelectorAll("#statusFilters .filter-chip").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll("#statusFilters .filter-chip").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentStatusFilter = btn.dataset.filter; renderTasks(); }); }); document.querySelectorAll("#categoryFilters .filter-chip").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll("#categoryFilters .filter-chip").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentCategoryFilter = btn.dataset.cat; renderTasks(); }); }); searchInput.addEventListener("input", (e) => { searchQuery = e.target.value; renderTasks(); }); sortSelect.addEventListener("change", (e) => { sortMode = e.target.value; renderTasks(); }); clearCompletedBtn.addEventListener("click", () => { tasks = tasks.filter(t => !t.completed); saveUserTasks(); renderTasks(); updateProgressBar(); }); clearAllBtn.addEventListener("click", () => { if(confirm("Delete ALL tasks permanently?")) { tasks = []; saveUserTasks(); renderTasks(); updateProgressBar(); } }); }
    const usersKey = "taskflow_pro_users";
    function getUsers() { const users = localStorage.getItem(usersKey); return users ? JSON.parse(users) : []; }
    function saveUsers(users) { localStorage.setItem(usersKey, JSON.stringify(users)); }
    function login(email, password) { const users = getUsers(); const user = users.find(u => u.email === email && u.password === password); if(user) { currentUser = { email: user.email }; localStorage.setItem("taskflow_current_user", JSON.stringify(currentUser)); return true; } return false; }
    function signup(email, password) { const users = getUsers(); if(users.find(u => u.email === email)) return false; users.push({ email, password }); saveUsers(users); currentUser = { email }; localStorage.setItem("taskflow_current_user", JSON.stringify(currentUser)); return true; }
    function logout() { currentUser = null; localStorage.removeItem("taskflow_current_user"); tasks = []; showAuthScreen(); }
    function checkAutoLogin() { const saved = localStorage.getItem("taskflow_current_user"); if(saved) { currentUser = JSON.parse(saved); loadUserTasks(); showAppScreen(); } else showAuthScreen(); }
    function showAuthScreen() { authContainer.style.display = "flex"; appContainer.style.display = "none"; renderAuthForm(); }
    function showAppScreen() { authContainer.style.display = "none"; appContainer.style.display = "block"; userEmailDisplay.innerText = currentUser.email; loadUserTasks(); }
    let isLoginMode = true;
    function renderAuthForm() { const authFormDiv = document.getElementById("authForm"); if(isLoginMode) { authFormDiv.innerHTML = `<input type="email" id="loginEmail" class="auth-input" placeholder="Email address"><input type="password" id="loginPassword" class="auth-input" placeholder="Password"><div id="authError" class="error-msg"></div><button id="loginBtn" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Login</button><div class="switch-auth">Don't have an account? <span id="showSignup">Create account</span></div>`; document.getElementById("loginBtn").addEventListener("click", () => { const email = document.getElementById("loginEmail").value.trim(), pwd = document.getElementById("loginPassword").value; if(!email||!pwd) document.getElementById("authError").innerText="Enter email and password"; else if(login(email,pwd)) { loadUserTasks(); showAppScreen(); } else document.getElementById("authError").innerText="Invalid credentials"; }); document.getElementById("showSignup").addEventListener("click", () => { isLoginMode=false; renderAuthForm(); }); } else { authFormDiv.innerHTML = `<input type="email" id="signupEmail" class="auth-input" placeholder="Email address"><input type="password" id="signupPassword" class="auth-input" placeholder="Password"><div id="authError" class="error-msg"></div><button id="signupBtn" class="auth-btn"><i class="fas fa-user-plus"></i> Sign Up</button><div class="switch-auth">Already have an account? <span id="showLogin">Login</span></div>`; document.getElementById("signupBtn").addEventListener("click", () => { const email = document.getElementById("signupEmail").value.trim(), pwd = document.getElementById("signupPassword").value; if(!email||!pwd) document.getElementById("authError").innerText="Enter email and password"; else if(pwd.length<4) document.getElementById("authError").innerText="Password min 4 chars"; else if(signup(email,pwd)) { loadUserTasks(); showAppScreen(); } else document.getElementById("authError").innerText="Email already exists"; }); document.getElementById("showLogin").addEventListener("click", () => { isLoginMode=true; renderAuthForm(); }); } }
    logoutBtn.addEventListener("click", logout); addBtn.addEventListener("click", addNewTask); window.openEditModal = openEditModal; window.closeEditModal = closeEditModal; window.saveEditTask = saveEditTask; initFilters(); checkAutoLogin();
  </script>
</body>
</html>
