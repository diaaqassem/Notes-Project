<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TaskFlow Pro</title>
  <link rel="icon" type="image/png" href="./head.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    :root {
      --bg-primary: #000000;
      --bg-secondary: #000000;
      --bg-tertiary: #0a0a0a;
      --card-bg: #000000;
      --card-border: #1e2a3a;
      --text-primary: #edf2f7;
      --text-secondary: #fff;
      --text-muted: #6c7a8e;
      --input-bg: #0a0a0a;
      --input-border: #253040;
      --badge-bg: #17212b;
      --hover-bg: #1a1a1a;
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.8);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.9);
      --progress-bg: #1e2a3a;
      --priority-high: #f97373;
      --priority-medium: #fbbf6b;
      --priority-low: #6bdc9c;
      --accent: #6366f1;
      --accent-dark: #4f46e5;
      --danger: #f87171;
      --success: #4ade80;
      --pin-color: #facc15;
    }

    body {
      zoom: 1.2;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* Confetti Canvas */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    /* Custom Scrollbar */
    .tasks-grid::-webkit-scrollbar {
      width: 4px;
    }
    .tasks-grid::-webkit-scrollbar-track {
      background: #0a0a0a;
      border-radius: 10px;
    }
    .tasks-grid::-webkit-scrollbar-thumb {
      background: #1a1a1a;
      border-radius: 10px;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .edit-modal {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    .modal-overlay.active .edit-modal { transform: scale(1); }
    .edit-modal h3 { font-size: 1.3rem; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent), #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .edit-modal input, .edit-modal select, .edit-modal textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 12px;
      color: var(--text-primary);
      outline: none;
      font-size: 0.85rem;
    }
    .edit-image-upload-area {
      background: var(--input-bg);
      border: 2px dashed var(--input-border);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
      font-size: 0.8rem;
    }
    .edit-image-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .edit-image-item { position: relative; width: 70px; height: 70px; border-radius: 12px; overflow: hidden; border: 1px solid var(--card-border); }
    .edit-image-item img { width: 100%; height: 100%; object-fit: cover; }
    .edit-remove-img {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      cursor: pointer;
      font-size: 10px;
    }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions button { flex: 1; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .save-btn { background: var(--accent); border: none; color: white; }
    .cancel-btn { background: transparent; border: 1px solid var(--card-border); color: var(--text-secondary); }

    /* Auth Styles */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #000000;
    }
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 30px 20px;
      width: 100%;
      max-width: 400px;
    }
    .auth-card h2 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; text-align: center; }
    .auth-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 40px;
      padding: 12px 18px;
      margin-bottom: 14px;
      color: var(--text-primary);
      outline: none;
      font-size: 0.9rem;
    }
    .auth-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 40px;
      padding: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      font-size: 0.9rem;
    }
    .switch-auth { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.8rem; }
    .switch-auth span { color: var(--accent); cursor: pointer; font-weight: 600; }
    .error-msg { color: var(--danger); font-size: 0.7rem; margin-top: -10px; margin-bottom: 10px; }

    /* Main App */
    .app-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px 12px;
      display: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      gap: 12px;
    }
    .title-section h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .title-section p { color: var(--text-muted); font-size: 0.7rem; margin-top: 4px; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-tertiary);
      padding: 6px 14px;
      border-radius: 40px;
      border: 1px solid var(--card-border);
    }
    .user-email { font-size: 0.75rem; color: var(--text-secondary); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.8rem; }
    .sync-status { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--success); }
    
    .dashboard {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    
    @media (min-width: 768px) {
      .dashboard {
        grid-template-columns: 260px 1fr;
        gap: 24px;
      }
      .app-container {
        padding: 20px;
      }
      .title-section h1 { font-size: 1.8rem; }
    }
    
    .sidebar {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid var(--card-border);
      height: fit-content;
    }
    .filter-group { margin-bottom: 24px; }
    .filter-group h3 { font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; color: var(--text-secondary); letter-spacing: 0.5px; }
    .filter-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-chip {
      border: none;
      background: var(--badge-bg);
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .filter-chip.active { background: var(--accent); color: white; }
    
    .progress-card {
      margin-top: 16px;
      background: var(--card-bg);
      border-radius: 18px;
      padding: 14px;
    }
    .progress-card h3 { font-size: 0.75rem; margin-bottom: 8px; }
    .progress-bar {
      height: 6px;
      background: var(--progress-bg);
      border-radius: 20px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }
    .clear-all-btn {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border: 1px solid var(--danger);
      margin-top: 10px;
      width: 100%;
      font-size: 0.7rem;
      padding: 8px;
    }
    .backup-btn {
      background: var(--accent);
      color: white;
      margin-top: 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.75rem;
      padding: 10px;
    }
    .backup-menu {
      margin-top: 10px;
      background: var(--bg-tertiary);
      border-radius: 14px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .backup-menu.show { display: flex; }
    .backup-option {
      background: var(--badge-bg);
      border: none;
      padding: 8px;
      border-radius: 30px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.7rem;
      text-align: center;
    }
    
    .task-panel {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 16px;
      border: 1px solid var(--card-border);
    }
    .add-task-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
      background: var(--bg-secondary);
      padding: 16px;
      border-radius: 20px;
    }
    .add-task-form input, .add-task-form select, .add-task-form textarea {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 30px;
      padding: 10px 14px;
      color: var(--text-primary);
      outline: none;
      width: 100%;
      font-size: 0.85rem;
    }
    .add-task-form textarea {
      border-radius: 16px;
      min-height: 60px;
    }
    .image-upload-area {
      background: var(--input-bg);
      border: 2px dashed var(--input-border);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .image-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .image-preview-item {
      position: relative;
      width: 65px;
      height: 65px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--card-border);
    }
    .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .remove-image-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 9px;
      cursor: pointer;
    }
    .btn-add {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 0.85rem;
    }
    .search-sort {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 40px;
      padding: 6px 14px;
      flex: 2;
    }
    .search-box input {
      background: transparent;
      border: none;
      padding: 8px;
      width: 100%;
      color: var(--text-primary);
      outline: none;
      font-size: 0.8rem;
    }
    .sort-select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 40px;
      padding: 8px 14px;
      color: var(--text-primary);
      font-size: 0.75rem;
    }
    
    /* Grid Layout - Mobile: 2 columns exactly */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-height: 65vh;
      overflow-y: auto;
      padding: 2px;
    }
    
    @media (min-width: 600px) {
      .tasks-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 2fr));
        gap: 16px;
      }
    }
    
    @media (min-width: 1024px) {
      .tasks-grid {
        grid-template-columns: repeat(auto-fill, minmax(320px, 2fr));
        gap: 20px;
      }
    }
    
    /* Task Card - Larger text on mobile */
    .task-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 14px;
      border: 1px solid var(--card-border);
      transition: all 0.3s ease;
      max-height: 320px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    
    /* Star animation effect on complete - longer duration */
    @keyframes starBurstLong {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 1;
      }
      50% {
        transform: scale(1.2) rotate(90deg);
        opacity: 0.8;
      }
      100% {
        transform: scale(2) rotate(180deg);
        opacity: 0;
      }
    }
    
    @keyframes floatingStar {
      0% {
        transform: translateY(0) translateX(0) scale(0.5);
        opacity: 1;
      }
      25% {
        transform: translateY(-30px) translateX(-15px) scale(1);
        opacity: 0.9;
      }
      50% {
        transform: translateY(-60px) translateX(15px) scale(1.2);
        opacity: 0.7;
      }
      75% {
        transform: translateY(-90px) translateX(-10px) scale(0.8);
        opacity: 0.4;
      }
      100% {
        transform: translateY(-120px) translateX(10px) scale(0.3);
        opacity: 0;
      }
    }
    
    @keyframes glowPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(99, 102, 241, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
      }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
    
    .task-card.completing {
      animation: glowPulse 0.5s ease-out;
    }
    
    .task-card .star-effect {
      position: absolute;
      pointer-events: none;
      font-size: 24px;
      animation: starBurstLong 1.2s ease-out forwards;
      z-index: 10;
    }
    
    .task-card .floating-star {
      position: absolute;
      pointer-events: none;
      font-size: 20px;
      animation: floatingStar 1.5s ease-out forwards;
      z-index: 10;
    }
    
    @media (min-width: 768px) {
      .task-card {
        max-height: 360px;
        padding: 18px;
        border-radius: 18px;
      }
    }
    
    .task-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
    }
    
    .task-card.pinned {
      border-left: 3px solid var(--pin-color);
    }
    
    .task-card.completed-task {
      opacity: 0.85;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(168, 85, 247, 0.08));
    }
    
    /* Internal scrollable content */
    .task-card-scroll {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .task-card-scroll::-webkit-scrollbar {
      width: 3px;
    }
    .task-card-scroll::-webkit-scrollbar-track {
      background: #000000;
      border-radius: 3px;
    }
    .task-card-scroll::-webkit-scrollbar-thumb {
      background: #1a1a1a;
      border-radius: 3px;
    }
    
    /* Header section */
    .task-card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-shrink: 0;
    }
    
    .task-check {
      width: 22px;
      height: 22px;
      appearance: none;
      background: var(--input-bg);
      border: 2px solid var(--accent);
      border-radius: 50%;
      cursor: pointer;
      margin-top: 2px;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s ease;
    }
    .task-check:checked {
      background: var(--success);
      border-color: var(--success);
      animation: shake 0.3s ease;
    }
    .task-check:checked::after {
      content: "\f00c";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      font-size: 11px;
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .task-card-content {
      flex: 1;
      min-width: 0;
    }
    
    .task-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    
    .task-title {
      font-weight: 700;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      word-break: break-word;
      line-height: 1.35;
    }
    
    @media (min-width: 768px) {
      .task-title {
        font-size: 1.1rem;
      }
    }
    
    .completed-title {
      text-decoration: line-through;
      opacity: 0.7;
    }
    
    .task-actions-card {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    
    .action-icon {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 5px 7px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-icon:hover {
      background: var(--hover-bg);
      color: var(--accent);
      transform: scale(1.1);
    }
    .pin-icon.active {
      color: var(--pin-color);
    }
    
    .task-meta-card {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
      flex-shrink: 0;
    }
    
    .priority-badge {
      padding: 4px 9px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .priority-high { background: #f9737320; color: #f97373; }
    .priority-medium { background: #fbbf6b20; color: #fbbf6b; }
    .priority-low { background: #6bdc9c20; color: #6bdc9c; }
    .cat-badge {
      background: var(--badge-bg);
      padding: 4px 9px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .due-date {
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    /* Description styling - Larger text */
    .task-desc-card {
      font-size: 0.9rem;
      color: var(--text-secondary);
      background: var(--input-bg);
      padding: 10px 12px;
      border-radius: 12px;
      word-break: break-word;
      line-height: 1.45;
    }
    
    @media (min-width: 768px) {
      .task-desc-card {
        font-size: 0.95rem;
        padding: 10px 14px;
      }
    }
    
    /* Images section */
    .task-images-card {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
      flex-shrink: 0;
    }
    
    .task-image-card {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--card-border);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    
    @media (min-width: 768px) {
      .task-image-card {
        width: 65px;
        height: 65px;
      }
    }
    
    .task-image-card:hover {
      transform: scale(1.05);
    }
    .task-image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .more-images-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: white;
      font-size: 0.75rem;
      font-weight: bold;
    }
    
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      grid-column: 1 / -1;
      font-size: 0.9rem;
    }
    
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .form-row select, .form-row input[type="date"] {
      flex: 1;
      min-width: 100px;
    }
    
    /* Touch-friendly buttons */
    button, .filter-chip, .backup-option, .action-icon {
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>
  
  <div id="authContainer" class="auth-container">
    <div class="auth-card">
      <h2><i class="fas fa-cloud"></i></h2>
      <div id="authForm"></div>
    </div>
  </div>

  <div id="editModal" class="modal-overlay">
    <div class="edit-modal">
      <h3><i class="fas fa-edit"></i> Edit Task</h3>
      <p class="modal-subtitle">Update task details and images</p>
      <input type="text" id="editTaskId" hidden>
      <input type="text" id="editTitle" placeholder="Task title">
      <textarea id="editDescription" placeholder="Description"></textarea>
      <select id="editCategory"><option value="Study">Study</option><option value="Work">Work</option><option value="Personal">Personal</option></select>
      <select id="editPriority"><option value="High">High Priority</option><option value="Medium">Medium Priority</option><option value="Low">Low Priority</option></select>
      <input type="date" id="editDueDate">
      <div class="edit-image-section">
        <div class="edit-image-upload-area" id="editImageUploadArea"><i class="fas fa-plus"></i> Add images<input type="file" id="editImageInput" multiple accept="image/*" style="display: none;"></div>
        <div id="editImageGrid" class="edit-image-grid"></div>
      </div>
      <div class="modal-actions"><button class="cancel-btn" onclick="closeEditModal()">Cancel</button><button class="save-btn" onclick="saveEditTask()">Save</button></div>
    </div>
  </div>

  <div id="lightbox" class="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src=""></div>

  <div id="appContainer" class="app-container">
    <div class="header">
      <div class="title-section">
        <h1><i class="fas fa-cloud"></i></h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span id="userEmailDisplay" class="user-email"></span>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <div class="dashboard">
      <div class="sidebar">
        <div class="filter-group">
          <h3><i class="fas fa-filter"></i> Status</h3>
          <div class="filter-buttons" id="statusFilters">
            <button data-filter="all" class="filter-chip active">All</button>
            <button data-filter="pending" class="filter-chip">Pending</button>
            <button data-filter="completed" class="filter-chip">Completed</button>
          </div>
        </div>
        <div class="filter-group">
          <h3><i class="fas fa-tags"></i> Categories</h3>
          <div class="filter-buttons" id="categoryFilters">
            <button data-cat="All" class="filter-chip active">All</button>
            <button data-cat="Study" class="filter-chip">Study</button>
            <button data-cat="Work" class="filter-chip">Work</button>
            <button data-cat="Personal" class="filter-chip">Personal</button>
          </div>
        </div>
        <div class="progress-card">
          <h3><i class="fas fa-chart-simple"></i> Progress</h3>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span id="progressPercent">0%</span> completed
        </div>
        <button id="clearCompletedBtn" class="filter-chip clear-all-btn"><i class="fas fa-trash-alt"></i> Clear Completed</button>
        <button id="clearAllBtn" class="filter-chip clear-all-btn" style="margin-top:8px;"><i class="fas fa-dumpster"></i> Clear All</button>
        <button id="backupBtn" class="filter-chip backup-btn"><i class="fas fa-database"></i> Backup</button>
        <div id="backupMenu" class="backup-menu">
          <button class="backup-option" onclick="exportData()"><i class="fas fa-download"></i> Export JSON</button>
          <button class="backup-option" onclick="importData()"><i class="fas fa-upload"></i> Import Data</button>
          <button class="backup-option" onclick="resetData()"><i class="fas fa-trash-alt"></i> Reset All</button>
        </div>
        <div class="sync-status" style="margin-top: 12px;">
          <i class="fas fa-check-circle"></i> <span id="syncStatusText">Synced</span>
        </div>
      </div>

      <div class="task-panel">
        <div class="add-task-form">
          <input type="text" id="taskTitle" placeholder="Task title">
          <textarea id="taskDesc" rows="2" placeholder="Description"></textarea>
          <div class="image-upload-area" id="imageUploadArea">
            <i class="fas fa-cloud-upload-alt"></i> Click to add images (multiple)<br>
            <small>PNG, JPG, GIF up to 5MB</small>
            <input type="file" id="imageInput" multiple accept="image/*" style="display: none;">
          </div>
          <div id="imagePreviewContainer" class="image-preview-grid"></div>
          <div class="form-row">
            <select id="taskCategory">
              <option value="Study">Study</option>
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
            </select>
            <select id="taskPriority">
              <option value="High">High Priority</option>
              <option value="Medium">Medium Priority</option>
              <option value="Low">Low Priority</option>
            </select>
            <input type="date" id="taskDueDate">
          </div>
          <button id="addTaskBtn" class="btn-add"><i class="fas fa-plus"></i> Add Task</button>
        </div>

        <div class="search-sort">
          <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search..."></div>
          <select id="sortSelect" class="sort-select">
            <option value="date_asc">Due Date (earliest)</option>
            <option value="date_desc">Due Date (latest)</option>
            <option value="priority">Priority (High to Low)</option>
          </select>
        </div>

        <div id="tasksContainer" class="tasks-grid"></div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null, tasks = [], currentStatusFilter = "all", currentCategoryFilter = "All", searchQuery = "", sortMode = "date_asc", currentEditTaskId = null, currentImageDataUrls = [], editImageDataUrls = [];
    const authContainer = document.getElementById("authContainer"), appContainer = document.getElementById("appContainer"), tasksContainer = document.getElementById("tasksContainer"), addBtn = document.getElementById("addTaskBtn"), searchInput = document.getElementById("searchInput"), sortSelect = document.getElementById("sortSelect"), clearCompletedBtn = document.getElementById("clearCompletedBtn"), clearAllBtn = document.getElementById("clearAllBtn"), progressFill = document.getElementById("progressFill"), progressPercent = document.getElementById("progressPercent"), logoutBtn = document.getElementById("logoutBtn"), userEmailDisplay = document.getElementById("userEmailDisplay"), syncStatusText = document.getElementById("syncStatusText"), editModal = document.getElementById("editModal"), backupBtn = document.getElementById("backupBtn"), backupMenu = document.getElementById("backupMenu"), imageInput = document.getElementById("imageInput"), imageUploadArea = document.getElementById("imageUploadArea"), imagePreviewContainer = document.getElementById("imagePreviewContainer"), editImageInput = document.getElementById("editImageInput"), editImageUploadArea = document.getElementById("editImageUploadArea"), editImageGrid = document.getElementById("editImageGrid");
    
    // Confetti Effect
    function createConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      const particles = [];
      const colors = ['#6366f1', '#a855f7', '#facc15', '#4ade80', '#f97373', '#fbbf6b'];
      
      for (let i = 0; i < 150; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          size: Math.random() * 8 + 3,
          speedY: Math.random() * 6 + 4,
          speedX: (Math.random() - 0.5) * 5,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotationSpeed: (Math.random() - 0.5) * 12
        });
      }
      
      let animationId;
      let startTime = Date.now();
      
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let allFinished = true;
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.y += p.speedY;
          p.x += p.speedX;
          p.rotation += p.rotationSpeed;
          
          if (p.y < canvas.height + 50) {
            allFinished = false;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
          }
        }
        
        if (!allFinished && Date.now() - startTime < 2500) {
          animationId = requestAnimationFrame(animate);
        } else {
          cancelAnimationFrame(animationId);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      
      animate();
    }
    
    // Star effect on task complete - longer and more stars
    function createStarEffect(x, y) {
      const stars = ['⭐', '✨', '🌟', '⭐', '💫', '⭐', '✨', '🌟'];
      for (let i = 0; i < 16; i++) {
        setTimeout(() => {
          const star = document.createElement('div');
          const isFloating = i > 8;
          star.className = isFloating ? 'floating-star' : 'star-effect';
          star.innerHTML = stars[Math.floor(Math.random() * stars.length)];
          const offsetX = (Math.random() - 0.5) * 100;
          const offsetY = (Math.random() - 0.5) * 80 - 40;
          star.style.left = (x + offsetX) + 'px';
          star.style.top = (y + offsetY) + 'px';
          star.style.fontSize = (Math.random() * 20 + 20) + 'px';
          document.body.appendChild(star);
          setTimeout(() => star.remove(), 1500);
        }, i * 80);
      }
    }
    
    backupBtn.addEventListener("click", (e) => { e.stopPropagation(); backupMenu.classList.toggle("show"); });
    document.addEventListener("click", (e) => { if (!backupBtn.contains(e.target) && !backupMenu.contains(e.target)) backupMenu.classList.remove("show"); });
    imageUploadArea.addEventListener("click", () => imageInput.click());
    imageInput.addEventListener("change", (e) => { Array.from(e.target.files).forEach(file => { if(file.size <= 5*1024*1024) { const reader = new FileReader(); reader.onload = (ev) => { currentImageDataUrls.push(ev.target.result); updateImagePreview(); }; reader.readAsDataURL(file); } else alert("Image too large. Max 5MB"); }); imageInput.value = ""; });
    function updateImagePreview() { imagePreviewContainer.innerHTML = currentImageDataUrls.map((url, idx) => `<div class="image-preview-item"><img src="${url}"><button class="remove-image-btn" onclick="removeImage(${idx})"><i class="fas fa-times"></i></button></div>`).join(""); }
    window.removeImage = function(idx) { currentImageDataUrls.splice(idx,1); updateImagePreview(); };
    function clearImagePreview() { currentImageDataUrls = []; updateImagePreview(); }
    editImageUploadArea.addEventListener("click", () => editImageInput.click());
    editImageInput.addEventListener("change", (e) => { Array.from(e.target.files).forEach(file => { if(file.size <= 5*1024*1024) { const reader = new FileReader(); reader.onload = (ev) => { editImageDataUrls.push(ev.target.result); updateEditImagePreview(); }; reader.readAsDataURL(file); } else alert("Image too large. Max 5MB"); }); editImageInput.value = ""; });
    function updateEditImagePreview() { editImageGrid.innerHTML = editImageDataUrls.map((url, idx) => `<div class="edit-image-item"><img src="${url}"><button class="edit-remove-img" onclick="removeEditImage(${idx})"><i class="fas fa-times"></i></button></div>`).join(""); }
    window.removeEditImage = function(idx) { editImageDataUrls.splice(idx,1); updateEditImagePreview(); };
    function getStorageKeyForUser(email) { return `taskflow_pro_${email.replace(/[^a-zA-Z0-9]/g, '_')}`; }
    function saveUserTasks() { if(currentUser) { localStorage.setItem(getStorageKeyForUser(currentUser.email), JSON.stringify(tasks)); syncStatusText.innerHTML = '✓ Synced'; setTimeout(() => syncStatusText.innerHTML = '☁️ Cloud', 2000); } }
    function loadUserTasks() { if(currentUser) { const stored = localStorage.getItem(getStorageKeyForUser(currentUser.email)); if(stored) { tasks = JSON.parse(stored); tasks = tasks.map(t => ({ ...t, pinned: t.pinned || false, description: t.description || "", images: t.images || [], completed: t.completed || false })); } else { tasks = []; saveUserTasks(); } renderTasks(); updateProgressBar(); } }
    function updateProgressBar() { const total = tasks.length, completedCount = tasks.filter(t => t.completed === true).length, percent = total === 0 ? 0 : Math.round((completedCount / total) * 100); progressFill.style.width = `${percent}%`; progressPercent.innerText = `${percent}%`; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function toggleTaskCompletion(taskId, isChecked) { 
      const task = tasks.find(t => t.id === taskId); 
      if(task) { 
        const wasCompleted = task.completed;
        task.completed = isChecked; 
        saveUserTasks(); 
        renderTasks(); 
        updateProgressBar();
        
        // Show celebration effects when completing a task
        if (isChecked && !wasCompleted) {
          createConfetti();
          // Create multiple stars around the checkbox
          const checkbox = document.querySelector(`.task-check[data-id="${taskId}"]`);
          if (checkbox) {
            const rect = checkbox.getBoundingClientRect();
            createStarEffect(rect.left + rect.width/2, rect.top + rect.height/2);
          }
        }
      } 
    }
    
    function getFilteredSortedTasks() { let filtered = tasks.filter(t => { if(currentStatusFilter === "completed" && !t.completed) return false; if(currentStatusFilter === "pending" && t.completed) return false; if(currentCategoryFilter !== "All" && t.category !== currentCategoryFilter) return false; if(searchQuery.trim() && !t.title.toLowerCase().includes(searchQuery.toLowerCase())) return false; return true; }); if(sortMode === "date_asc") filtered.sort((a,b) => (a.dueDate || "9999-12-31").localeCompare(b.dueDate || "9999-12-31")); else if(sortMode === "date_desc") filtered.sort((a,b) => (b.dueDate || "9999-12-31").localeCompare(a.dueDate || "9999-12-31")); else if(sortMode === "priority") { const order = { "High":1, "Medium":2, "Low":3 }; filtered.sort((a,b) => (order[a.priority]||3) - (order[b.priority]||3)); } filtered.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0)); return filtered; }
    
    function showAllImages(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if(task && task.images && task.images.length > 0) {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:2001;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px;overflow-y:auto;';
        modal.innerHTML = `<div style="background:#000;border:1px solid var(--accent);border-radius:20px;padding:20px;max-width:500px;max-height:80vh;overflow-y:auto;"><h3 style="color:var(--accent);margin-bottom:15px;">📸 All Images (${task.images.length})</h3><div style="display:flex;flex-direction:column;gap:10px;">${task.images.map(img => `<img src="${img}" style="width:100%;border-radius:12px;cursor:pointer;" onclick="openLightbox('${img}')">`).join('')}</div><button onclick="this.parentElement.parentElement.remove()" style="margin-top:15px;background:var(--accent);border:none;padding:10px;border-radius:10px;color:white;cursor:pointer;">Close</button></div>`;
        document.body.appendChild(modal);
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
      }
    }
    
    function renderTasks() { 
      const filtered = getFilteredSortedTasks(); 
      if(filtered.length === 0) { 
        tasksContainer.innerHTML = `<div class="empty-msg"><i class="fas fa-inbox"></i> No tasks found. Add your first task!</div>`; 
        return; 
      } 
      tasksContainer.innerHTML = filtered.map(task => `
        <div class="task-card ${task.pinned ? 'pinned' : ''} ${task.completed ? 'completed-task' : ''}" data-id="${task.id}">
          <div class="task-card-header">
            <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} data-id="${task.id}">
            <div class="task-card-content">
              <div class="task-title-row">
                <div class="task-title">
                  <span class="${task.completed ? 'completed-title' : ''}">${escapeHtml(task.title)}</span>
                  ${task.pinned ? '<i class="fas fa-thumbtack" style="color:#facc15; font-size:0.75rem;"></i>' : ''}
                </div>
                <div class="task-actions-card">
                  <button class="action-icon pin-icon ${task.pinned ? 'active' : ''}" data-id="${task.id}" data-action="pin"><i class="fas fa-thumbtack"></i></button>
                  <button class="action-icon" data-id="${task.id}" data-action="edit"><i class="fas fa-edit"></i></button>
                  <button class="action-icon" data-id="${task.id}" data-action="delete"><i class="fas fa-trash"></i></button>
                </div>
              </div>
              <div class="task-meta-card">
                <span class="priority-badge priority-${task.priority.toLowerCase()}">${task.priority === 'High' ? '🔴' : task.priority === 'Medium' ? '🟡' : '🟢'} ${task.priority}</span>
                <span class="cat-badge"><i class="fas fa-folder"></i> ${task.category}</span>
                <span class="due-date"><i class="far fa-calendar-alt"></i> ${task.dueDate || 'No date'}</span>
              </div>
            </div>
          </div>
          <div class="task-card-scroll">
            ${task.description ? `<div class="task-desc-card">${escapeHtml(task.description)}</div>` : ''}
            ${task.images && task.images.length ? `
              <div class="task-images-card">
                ${task.images.slice(0, 3).map(img => `<div class="task-image-card" onclick="openLightbox('${img.replace(/'/g, "\\'")}')"><img src="${img}" alt="task image"></div>`).join('')}
                ${task.images.length > 3 ? `<div class="task-image-card more-images-badge" onclick="showAllImages(${task.id})">+${task.images.length-3}</div>` : ''}
              </div>
            ` : ''}
          </div>
        </div>
      `).join(""); 
      attachTaskEvents(); 
    }
    
    function attachTaskEvents() { 
      document.querySelectorAll('.task-check').forEach(cb => { cb.removeEventListener('change', handleCheckboxChange); cb.addEventListener('change', handleCheckboxChange); }); 
      document.querySelectorAll('[data-action="delete"]').forEach(btn => btn.addEventListener('click', handleDeleteClick)); 
      document.querySelectorAll('[data-action="pin"]').forEach(btn => btn.addEventListener('click', handlePinClick)); 
      document.querySelectorAll('[data-action="edit"]').forEach(btn => btn.addEventListener('click', handleEditClick)); 
    }
    function handleCheckboxChange(e) { toggleTaskCompletion(parseInt(e.currentTarget.dataset.id), e.currentTarget.checked); }
    function handleDeleteClick(e) { const id = parseInt(e.currentTarget.dataset.id); if(confirm("Delete this task?")) { tasks = tasks.filter(t => t.id !== id); saveUserTasks(); renderTasks(); updateProgressBar(); } }
    function handlePinClick(e) { const id = parseInt(e.currentTarget.dataset.id); const task = tasks.find(t => t.id === id); if(task) { task.pinned = !task.pinned; saveUserTasks(); renderTasks(); } }
    function handleEditClick(e) { openEditModal(parseInt(e.currentTarget.dataset.id)); }
    function addNewTask() { const title = document.getElementById("taskTitle").value.trim(); if(!title) return alert("Enter task title"); tasks.push({ id: Date.now(), title, description: document.getElementById("taskDesc").value.trim(), category: document.getElementById("taskCategory").value, priority: document.getElementById("taskPriority").value, dueDate: document.getElementById("taskDueDate").value, completed: false, pinned: false, images: [...currentImageDataUrls], createdAt: Date.now() }); document.getElementById("taskTitle").value = ""; document.getElementById("taskDesc").value = ""; document.getElementById("taskDueDate").value = ""; clearImagePreview(); saveUserTasks(); renderTasks(); updateProgressBar(); }
    function openEditModal(taskId) { const task = tasks.find(t => t.id === taskId); if(!task) return; currentEditTaskId = taskId; document.getElementById("editTaskId").value = taskId; document.getElementById("editTitle").value = task.title; document.getElementById("editDescription").value = task.description || ""; document.getElementById("editCategory").value = task.category; document.getElementById("editPriority").value = task.priority; document.getElementById("editDueDate").value = task.dueDate || ""; editImageDataUrls = [...(task.images || [])]; updateEditImagePreview(); editModal.classList.add("active"); }
    function closeEditModal() { editModal.classList.remove("active"); currentEditTaskId = null; editImageDataUrls = []; }
    function saveEditTask() { const task = tasks.find(t => t.id === currentEditTaskId); if(task) { task.title = document.getElementById("editTitle").value.trim(); if(!task.title) return alert("Task title cannot be empty"); task.description = document.getElementById("editDescription").value; task.category = document.getElementById("editCategory").value; task.priority = document.getElementById("editPriority").value; task.dueDate = document.getElementById("editDueDate").value; task.images = [...editImageDataUrls]; saveUserTasks(); renderTasks(); updateProgressBar(); closeEditModal(); } }
    editModal.addEventListener("click", (e) => { if(e.target === editModal) closeEditModal(); });
    document.addEventListener("keydown", (e) => { if(e.key === "Escape" && editModal.classList.contains("active")) closeEditModal(); });
    window.openLightbox = function(imgSrc) { document.getElementById("lightboxImg").src = imgSrc; document.getElementById("lightbox").classList.add("active"); };
    window.closeLightbox = function() { document.getElementById("lightbox").classList.remove("active"); };
    window.showAllImages = showAllImages;
    window.exportData = function() { const dataStr = JSON.stringify({ version:"1.0", exportDate:new Date().toISOString(), user:currentUser.email, tasks }, null, 2); const blob = new Blob([dataStr], {type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `taskflow_backup_${currentUser.email}_${Date.now()}.json`; a.click(); URL.revokeObjectURL(a.href); syncStatusText.innerHTML = '✓ Export complete'; setTimeout(() => syncStatusText.innerHTML = '☁️ Cloud', 2000); backupMenu.classList.remove("show"); };
    window.importData = function() { const input = document.createElement("input"); input.type = "file"; input.accept = "application/json"; input.onchange = (e) => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = (ev) => { try { const imported = JSON.parse(ev.target.result); if(imported.tasks && Array.isArray(imported.tasks)) { tasks = imported.tasks.map(t => ({ ...t, id: Date.now() + Math.random(), images: t.images || [], completed: t.completed || false, pinned: t.pinned || false })); saveUserTasks(); renderTasks(); updateProgressBar(); syncStatusText.innerHTML = '✓ Import successful'; setTimeout(() => syncStatusText.innerHTML = '☁️ Cloud', 2000); } else alert("Invalid backup file format"); } catch(err) { alert("Error importing file"); } }; reader.readAsText(file); }; input.click(); backupMenu.classList.remove("show"); };
    window.resetData = function() { if(confirm(" WARNING: This will delete ALL your tasks. This action cannot be undone. Continue?")) { tasks = []; saveUserTasks(); renderTasks(); updateProgressBar(); syncStatusText.innerHTML = '✓ All cleared'; setTimeout(() => syncStatusText.innerHTML = '☁️ Cloud', 2000); } backupMenu.classList.remove("show"); };
    function initFilters() { document.querySelectorAll("#statusFilters .filter-chip").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll("#statusFilters .filter-chip").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentStatusFilter = btn.dataset.filter; renderTasks(); }); }); document.querySelectorAll("#categoryFilters .filter-chip").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll("#categoryFilters .filter-chip").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentCategoryFilter = btn.dataset.cat; renderTasks(); }); }); searchInput.addEventListener("input", (e) => { searchQuery = e.target.value; renderTasks(); }); sortSelect.addEventListener("change", (e) => { sortMode = e.target.value; renderTasks(); }); clearCompletedBtn.addEventListener("click", () => { tasks = tasks.filter(t => !t.completed); saveUserTasks(); renderTasks(); updateProgressBar(); }); clearAllBtn.addEventListener("click", () => { if(confirm("Delete ALL tasks permanently?")) { tasks = []; saveUserTasks(); renderTasks(); updateProgressBar(); } }); }
    const usersKey = "taskflow_pro_users";
    function getUsers() { const users = localStorage.getItem(usersKey); return users ? JSON.parse(users) : []; }
    function saveUsers(users) { localStorage.setItem(usersKey, JSON.stringify(users)); }
    function login(email, password) { const users = getUsers(); const user = users.find(u => u.email === email && u.password === password); if(user) { currentUser = { email: user.email }; localStorage.setItem("taskflow_current_user", JSON.stringify(currentUser)); return true; } return false; }
    function signup(email, password) { const users = getUsers(); if(users.find(u => u.email === email)) return false; users.push({ email, password }); saveUsers(users); currentUser = { email }; localStorage.setItem("taskflow_current_user", JSON.stringify(currentUser)); return true; }
    function logout() { currentUser = null; localStorage.removeItem("taskflow_current_user"); tasks = []; showAuthScreen(); }
    function checkAutoLogin() { const saved = localStorage.getItem("taskflow_current_user"); if(saved) { currentUser = JSON.parse(saved); loadUserTasks(); showAppScreen(); } else showAuthScreen(); }
    function showAuthScreen() { authContainer.style.display = "flex"; appContainer.style.display = "none"; renderAuthForm(); }
    function showAppScreen() { authContainer.style.display = "none"; appContainer.style.display = "block"; userEmailDisplay.innerText = currentUser.email; loadUserTasks(); }
    let isLoginMode = true;
    function renderAuthForm() { const authFormDiv = document.getElementById("authForm"); if(isLoginMode) { authFormDiv.innerHTML = `<input type="email" id="loginEmail" class="auth-input" placeholder="Email address"><input type="password" id="loginPassword" class="auth-input" placeholder="Password"><div id="authError" class="error-msg"></div><button id="loginBtn" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Login</button><div class="switch-auth">Don't have an account? <span id="showSignup">Create account</span></div>`; document.getElementById("loginBtn").addEventListener("click", () => { const email = document.getElementById("loginEmail").value.trim(), pwd = document.getElementById("loginPassword").value; if(!email||!pwd) document.getElementById("authError").innerText="Enter email and password"; else if(login(email,pwd)) { loadUserTasks(); showAppScreen(); } else document.getElementById("authError").innerText="Invalid credentials"; }); document.getElementById("showSignup").addEventListener("click", () => { isLoginMode=false; renderAuthForm(); }); } else { authFormDiv.innerHTML = `<input type="email" id="signupEmail" class="auth-input" placeholder="Email address"><input type="password" id="signupPassword" class="auth-input" placeholder="Password"><div id="authError" class="error-msg"></div><button id="signupBtn" class="auth-btn"><i class="fas fa-user-plus"></i> Sign Up</button><div class="switch-auth">Already have an account? <span id="showLogin">Login</span></div>`; document.getElementById("signupBtn").addEventListener("click", () => { const email = document.getElementById("signupEmail").value.trim(), pwd = document.getElementById("signupPassword").value; if(!email||!pwd) document.getElementById("authError").innerText="Enter email and password"; else if(pwd.length<4) document.getElementById("authError").innerText="Password min 4 chars"; else if(signup(email,pwd)) { loadUserTasks(); showAppScreen(); } else document.getElementById("authError").innerText="Email already exists"; }); document.getElementById("showLogin").addEventListener("click", () => { isLoginMode=true; renderAuthForm(); }); } }
    logoutBtn.addEventListener("click", logout); addBtn.addEventListener("click", addNewTask); window.openEditModal = openEditModal; window.closeEditModal = closeEditModal; window.saveEditTask = saveEditTask; initFilters(); checkAutoLogin();
  </script>
