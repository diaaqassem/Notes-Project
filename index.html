<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TaskFlow</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    /* Dark Theme - Pure Black */
    :root {
      --bg-primary: #000000;
      --bg-secondary: #000000;
      --bg-tertiary: #0a0a0a;
      --card-bg: #000000;
      --card-border: #1e2a3a;
      --text-primary: #edf2f7;
      --text-secondary: #fff;
      --text-muted: #6c7a8e;
      --input-bg: #0a0a0a;
      --input-border: #253040;
      --badge-bg: #17212b;
      --hover-bg: #1a1a1a;
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.8);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.9);
      --progress-bg: #1e2a3a;
      --priority-high: #f97373;
      --priority-medium: #fbbf6b;
      --priority-low: #6bdc9c;
      --accent: #6366f1;
      --accent-dark: #4f46e5;
      --danger: #f87171;
      --success: #4ade80;
      --pin-color: #facc15;
    }

    body {
      zoom: 1.2;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* Custom Black Scrollbar */
    .tasks-list::-webkit-scrollbar {
      width: 8px;
    }
    .tasks-list::-webkit-scrollbar-track {
      background: #000000;
      border-radius: 10px;
    }
    .tasks-list::-webkit-scrollbar-thumb {
      background: #1a1a1a;
      border-radius: 10px;
    }
    .tasks-list::-webkit-scrollbar-thumb:hover {
      background: #2a2a2a;
    }

    /* Modal Styles - Edit Card */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .edit-modal {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      width: 90%;
      max-width: 550px;
      padding: 32px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    .modal-overlay.active .edit-modal {
      transform: scale(1);
    }
    .edit-modal h3 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .edit-modal .modal-subtitle {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 24px;
    }
    .edit-modal input, 
    .edit-modal select, 
    .edit-modal textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 20px;
      padding: 14px 18px;
      margin-bottom: 16px;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .edit-modal input:focus, 
    .edit-modal select:focus, 
    .edit-modal textarea:focus {
      border-color: var(--accent);
    }
    .edit-modal textarea {
      resize: vertical;
      min-height: 80px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-btn {
      background: var(--accent);
      border: none;
      color: white;
    }
    .save-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }
    .cancel-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-secondary);
    }
    .cancel-btn:hover {
      background: var(--hover-bg);
    }

    /* Auth Container */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #000000;
    }
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-md);
    }
    .auth-card h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .auth-card p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 28px;
    }
    .auth-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 48px;
      padding: 14px 20px;
      margin-bottom: 16px;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
    }
    .auth-input:focus {
      border-color: var(--accent);
    }
    .auth-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 48px;
      padding: 14px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }
    .auth-btn:hover {
      background: var(--accent-dark);
    }
    .switch-auth {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .switch-auth span {
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }
    .error-msg {
      color: var(--danger);
      font-size: 0.75rem;
      margin-top: -12px;
      margin-bottom: 12px;
    }

    /* Main App */
    .app-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 20px;
      display: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
      gap: 16px;
    }
    .title-section h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .title-section p {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 6px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-tertiary);
      padding: 8px 20px;
      border-radius: 48px;
      border: 1px solid var(--card-border);
    }
    .user-email {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .logout-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .sync-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--success);
    }
    .dashboard {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
    }
    .sidebar {
      background: var(--bg-secondary);
      border-radius: 28px;
      padding: 22px;
      border: 1px solid var(--card-border);
      height: fit-content;
    }
    .filter-group {
      margin-bottom: 28px;
    }
    .filter-group h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }
    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .filter-chip {
      border: none;
      background: var(--badge-bg);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .filter-chip.active {
      background: var(--accent);
      color: white;
    }
    .progress-card {
      margin-top: 20px;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 16px;
    }
    .progress-bar {
      height: 8px;
      background: var(--progress-bg);
      border-radius: 20px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
    }
    .clear-all-btn {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border: 1px solid var(--danger);
      margin-top: 12px;
      width: 100%;
    }
    .task-panel {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 24px;
      border: 1px solid var(--card-border);
    }
    .add-task-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
      background: var(--bg-secondary);
      padding: 20px;
      border-radius: 24px;
    }
    .add-task-form input, 
    .add-task-form select, 
    .add-task-form textarea {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 40px;
      padding: 12px 18px;
      color: var(--text-primary);
      outline: none;
      width: 100%;
    }
    .add-task-form textarea {
      border-radius: 20px;
      min-height: 60px;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .form-row select, 
    .form-row input[type="date"] {
      flex: 1;
      min-width: 120px;
    }
    .btn-add {
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .search-sort {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 50px;
      padding: 8px 18px;
      flex: 2;
    }
    .search-box input {
      background: transparent;
      border: none;
      padding: 10px;
      width: 100%;
      color: var(--text-primary);
      outline: none;
    }
    .sort-select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 40px;
      padding: 0 20px;
      color: var(--text-primary);
    }
    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 58vh;
      overflow-y: auto;
      padding-right: 8px;
    }
    .task-item {
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid var(--card-border);
      transition: all 0.2s;
    }
    .task-item:hover {
      transform: translateX(4px);
      border-left-color: var(--accent);
    }
    .task-item.pinned {
      border-left: 5px solid var(--pin-color);
    }
    .task-row-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .task-check {
      width: 22px;
      height: 22px;
      appearance: none;
      background: var(--input-bg);
      border: 2px solid var(--accent);
      border-radius: 50%;
      cursor: pointer;
      margin-top: 2px;
      position: relative;
      flex-shrink: 0;
    }
    .task-check:checked {
      background: var(--accent);
    }
    .task-check:checked::after {
      content: "\f00c";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      font-size: 11px;
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .task-content {
      flex: 1;
    }
    .task-title {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .task-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: var(--input-bg);
      padding: 10px 14px;
      border-radius: 16px;
      margin-top: 8px;
      word-break: break-word;
      line-height: 1.5;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }
    .priority-badge {
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .priority-high { background: #f9737320; color: #f97373; }
    .priority-medium { background: #fbbf6b20; color: #fbbf6b; }
    .priority-low { background: #6bdc9c20; color: #6bdc9c; }
    .cat-badge {
      background: var(--badge-bg);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .due-date {
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .task-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      border-top: 1px solid var(--card-border);
      padding-top: 12px;
      margin-top: 4px;
    }
    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 8px 12px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .icon-btn:hover {
      background: var(--hover-bg);
      color: var(--accent);
    }
    .pin-btn.active {
      color: var(--pin-color);
    }
    .empty-msg {
      text-align: center;
      padding: 50px;
      color: var(--text-muted);
    }
    footer {
      display: none;
    }
    @media (max-width: 800px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
      .form-row {
        flex-direction: column;
      }
      .form-row select, 
      .form-row input[type="date"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Login / Signup Container -->
  <div id="authContainer" class="auth-container">
    <div class="auth-card">
      <h2><i class="fas fa-cloud"></i></h2>
      <div id="authForm">
        <input type="email" id="loginEmail" class="auth-input" placeholder="Email address">
        <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
        <div id="authError" class="error-msg"></div>
        <button id="loginBtn" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
        <div class="switch-auth">Don't have an account? <span id="showSignup">Create account</span></div>
      </div>
    </div>
  </div>

  <!-- Edit Modal Card -->
  <div id="editModal" class="modal-overlay">
    <div class="edit-modal">
      <h3><i class="fas fa-edit"></i> Edit Task</h3>
      <p class="modal-subtitle">Update your task details</p>
      <input type="text" id="editTaskId" hidden>
      <input type="text" id="editTitle" placeholder="Task title">
      <textarea id="editDescription" placeholder="Description (optional)"></textarea>
      <select id="editCategory">
        <option value="Study">Study</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
      </select>
      <select id="editPriority">
        <option value="High">High Priority</option>
        <option value="Medium">Medium Priority</option>
        <option value="Low">Low Priority</option>
      </select>
      <input type="date" id="editDueDate">
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeEditModal()"><i class="fas fa-times"></i> Cancel</button>
        <button class="save-btn" onclick="saveEditTask()"><i class="fas fa-save"></i> Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appContainer" class="app-container">
    <div class="header">
      <div class="title-section">
        <h1><i class="fas fa-cloud-upload-alt"></i> </h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span id="userEmailDisplay" class="user-email"></span>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <div class="dashboard">
      <div class="sidebar">
        <div class="filter-group">
          <h3><i class="fas fa-filter"></i> Status</h3>
          <div class="filter-buttons" id="statusFilters">
            <button data-filter="all" class="filter-chip active">All</button>
            <button data-filter="pending" class="filter-chip">Pending</button>
            <button data-filter="completed" class="filter-chip">Completed</button>
          </div>
        </div>
        <div class="filter-group">
          <h3><i class="fas fa-tags"></i> Categories</h3>
          <div class="filter-buttons" id="categoryFilters">
            <button data-cat="All" class="filter-chip active">All</button>
            <button data-cat="Study" class="filter-chip">Study</button>
            <button data-cat="Work" class="filter-chip">Work</button>
            <button data-cat="Personal" class="filter-chip">Personal</button>
          </div>
        </div>
        <div class="progress-card">
          <h3><i class="fas fa-chart-simple"></i> Progress</h3>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span id="progressPercent">0%</span> completed
        </div>
        <button id="clearCompletedBtn" class="filter-chip clear-all-btn"><i class="fas fa-trash-alt"></i> Clear Completed</button>
        <button id="clearAllBtn" class="filter-chip clear-all-btn" style="margin-top:10px;"><i class="fas fa-dumpster"></i> Clear All Tasks</button>
        <div class="sync-status" style="margin-top: 16px;">
          <i class="fas fa-check-circle"></i> <span id="syncStatusText">Synced to cloud</span>
        </div>
      </div>

      <div class="task-panel">
        <div class="add-task-form">
          <input type="text" id="taskTitle" placeholder="Task title ...">
          <textarea id="taskDesc" rows="2" placeholder="Description (details)"></textarea>
          <div class="form-row">
            <select id="taskCategory">
              <option value="Study">Study</option>
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
            </select>
            <select id="taskPriority">
              <option value="High">High Priority</option>
              <option value="Medium">Medium Priority</option>
              <option value="Low">Low Priority</option>
            </select>
            <input type="date" id="taskDueDate">
          </div>
          <button id="addTaskBtn" class="btn-add"><i class="fas fa-plus"></i> Add Task</button>
        </div>

        <div class="search-sort">
          <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search tasks..."></div>
          <select id="sortSelect" class="sort-select">
            <option value="date_asc">Due Date (earliest)</option>
            <option value="date_desc">Due Date (latest)</option>
            <option value="priority">Priority (High to Low)</option>
          </select>
        </div>

        <div id="tasksContainer" class="tasks-list">
          <div class="empty-msg"><i class="fas fa-spinner fa-pulse"></i> Loading your tasks...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // User management (localStorage based - shared across devices)
    let currentUser = null;
    let tasks = [];
    let currentStatusFilter = "all";
    let currentCategoryFilter = "All";
    let searchQuery = "";
    let sortMode = "date_asc";
    let currentEditTaskId = null;
    
    // DOM Elements
    const authContainer = document.getElementById("authContainer");
    const appContainer = document.getElementById("appContainer");
    const tasksContainer = document.getElementById("tasksContainer");
    const addBtn = document.getElementById("addTaskBtn");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const clearCompletedBtn = document.getElementById("clearCompletedBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");
    const progressFill = document.getElementById("progressFill");
    const progressPercent = document.getElementById("progressPercent");
    const logoutBtn = document.getElementById("logoutBtn");
    const userEmailDisplay = document.getElementById("userEmailDisplay");
    const syncStatusText = document.getElementById("syncStatusText");
    const editModal = document.getElementById("editModal");
    
    // Storage functions
    function getStorageKeyForUser(email) {
      return `taskflow_cloud_${email.replace(/[^a-zA-Z0-9]/g, '_')}`;
    }
    
    function saveUserTasks() {
      if(currentUser) {
        const key = getStorageKeyForUser(currentUser.email);
        localStorage.setItem(key, JSON.stringify(tasks));
        syncStatusText.innerHTML = '<i class="fas fa-check-circle"></i> Synced to cloud';
        setTimeout(() => {
          syncStatusText.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Cloud sync';
        }, 2000);
      }
    }
    
    function loadUserTasks() {
      if(currentUser) {
        const key = getStorageKeyForUser(currentUser.email);
        const stored = localStorage.getItem(key);
        if(stored) {
          tasks = JSON.parse(stored);
          tasks = tasks.map(t => ({ ...t, pinned: t.pinned || false, description: t.description || "" }));
        } else {
          tasks = [
            { id: Date.now()+1, title: "Welcome to TaskFlow Cloud", description: "Click the edit button (pencil icon) to edit tasks in a beautiful modal card", category: "Work", priority: "High", dueDate: "2026-04-20", completed: false, pinned: true, createdAt: Date.now() },
            { id: Date.now()+2, title: "Try editing this task", description: "Click the edit icon to open the edit card", category: "Study", priority: "Medium", dueDate: "2026-04-15", completed: false, pinned: false, createdAt: Date.now() },
          ];
          saveUserTasks();
        }
        renderTasks();
        updateProgressBar();
      }
    }
    
    // Authentication
    const usersKey = "taskflow_users";
    
    function getUsers() {
      const users = localStorage.getItem(usersKey);
      return users ? JSON.parse(users) : [];
    }
    
    function saveUsers(users) {
      localStorage.setItem(usersKey, JSON.stringify(users));
    }
    
    function login(email, password) {
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);
      if(user) {
        currentUser = { email: user.email };
        localStorage.setItem("taskflow_current_user", JSON.stringify(currentUser));
        return true;
      }
      return false;
    }
    
    function signup(email, password) {
      const users = getUsers();
      if(users.find(u => u.email === email)) return false;
      users.push({ email, password });
      saveUsers(users);
      currentUser = { email };
      localStorage.setItem("taskflow_current_user", JSON.stringify(currentUser));
      return true;
    }
    
    function logout() {
      currentUser = null;
      localStorage.removeItem("taskflow_current_user");
      tasks = [];
      showAuthScreen();
    }
    
    function checkAutoLogin() {
      const saved = localStorage.getItem("taskflow_current_user");
      if(saved) {
        currentUser = JSON.parse(saved);
        loadUserTasks();
        showAppScreen();
      } else {
        showAuthScreen();
      }
    }
    
    function showAuthScreen() {
      authContainer.style.display = "flex";
      appContainer.style.display = "none";
    }
    
    function showAppScreen() {
      authContainer.style.display = "none";
      appContainer.style.display = "block";
      userEmailDisplay.innerText = currentUser.email;
      loadUserTasks();
    }
    
    // Edit Modal Functions
    function openEditModal(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if(!task) return;
      
      currentEditTaskId = taskId;
      document.getElementById("editTaskId").value = taskId;
      document.getElementById("editTitle").value = task.title;
      document.getElementById("editDescription").value = task.description || "";
      document.getElementById("editCategory").value = task.category;
      document.getElementById("editPriority").value = task.priority;
      document.getElementById("editDueDate").value = task.dueDate || "";
      
      editModal.classList.add("active");
    }
    
    function closeEditModal() {
      editModal.classList.remove("active");
      currentEditTaskId = null;
    }
    
    function saveEditTask() {
      const taskId = currentEditTaskId;
      const task = tasks.find(t => t.id === taskId);
      if(task) {
        task.title = document.getElementById("editTitle").value.trim();
        if(!task.title) {
          alert("Task title cannot be empty");
          return;
        }
        task.description = document.getElementById("editDescription").value;
        task.category = document.getElementById("editCategory").value;
        task.priority = document.getElementById("editPriority").value;
        task.dueDate = document.getElementById("editDueDate").value;
        
        saveUserTasks();
        renderTasks();
        updateProgressBar();
        closeEditModal();
      }
    }
    
    // Close modal on overlay click
    editModal.addEventListener("click", (e) => {
      if(e.target === editModal) closeEditModal();
    });
    
    // Escape key to close modal
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && editModal.classList.contains("active")) {
        closeEditModal();
      }
    });
    
    // Task Management Functions
    function getFilteredSortedTasks() {
      let filtered = tasks.filter(t => {
        if(currentStatusFilter === "completed" && !t.completed) return false;
        if(currentStatusFilter === "pending" && t.completed) return false;
        if(currentCategoryFilter !== "All" && t.category !== currentCategoryFilter) return false;
        if(searchQuery.trim() && !t.title.toLowerCase().includes(searchQuery.toLowerCase())) return false;
        return true;
      });
      if(sortMode === "date_asc") {
        filtered.sort((a,b) => (a.dueDate || "9999-12-31").localeCompare(b.dueDate || "9999-12-31"));
      } else if(sortMode === "date_desc") {
        filtered.sort((a,b) => (b.dueDate || "9999-12-31").localeCompare(a.dueDate || "9999-12-31"));
      } else if(sortMode === "priority") {
        const order = { "High": 1, "Medium": 2, "Low": 3 };
        filtered.sort((a,b) => (order[a.priority] || 3) - (order[b.priority] || 3));
      }
      filtered.sort((a,b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
      return filtered;
    }
    
    function updateProgressBar() {
      const total = tasks.length;
      const completedCount = tasks.filter(t => t.completed).length;
      const percent = total === 0 ? 0 : Math.round((completedCount/total)*100);
      progressFill.style.width = `${percent}%`;
      progressPercent.innerText = `${percent}%`;
    }
    
    function escapeHtml(str) { 
      if(!str) return ''; 
      return str.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); 
    }
    
    function renderTasks() {
      const filtered = getFilteredSortedTasks();
      if(filtered.length === 0) {
        tasksContainer.innerHTML = `<div class="empty-msg"><i class="fas fa-inbox"></i> No tasks found. Add your first task!</div>`;
        return;
      }
      tasksContainer.innerHTML = filtered.map(task => `
        <div class="task-item ${task.pinned ? 'pinned' : ''}" data-id="${task.id}">
          <div class="task-row-top">
            <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} data-id="${task.id}">
            <div class="task-content">
              <div class="task-title">
                <span style="${task.completed ? 'text-decoration:line-through; opacity:0.7' : ''}">${escapeHtml(task.title)}</span>
                ${task.pinned ? '<i class="fas fa-thumbtack" style="color:#facc15;"></i>' : ''}
              </div>
              <div class="task-meta">
                <span class="priority-badge priority-${task.priority.toLowerCase()}">${task.priority === 'High' ? '🔴' : task.priority === 'Medium' ? '🟡' : '🟢'} ${task.priority}</span>
                <span class="cat-badge"><i class="fas fa-folder"></i> ${task.category}</span>
                <span class="due-date"><i class="far fa-calendar-alt"></i> ${task.dueDate || 'No date'}</span>
              </div>
            </div>
          </div>
          ${task.description ? `<div class="task-desc">${escapeHtml(task.description)}</div>` : ''}
          <div class="task-actions">
            <button class="icon-btn pin-btn ${task.pinned ? 'active' : ''}" data-id="${task.id}" data-action="pin"><i class="fas fa-thumbtack"></i> Pin</button>
            <button class="icon-btn edit-btn" data-id="${task.id}" data-action="edit"><i class="fas fa-edit"></i> Edit</button>
            <button class="icon-btn delete-btn" data-id="${task.id}" data-action="delete"><i class="fas fa-trash"></i> Delete</button>
          </div>
        </div>
      `).join("");
      attachTaskEvents();
    }
    
    function attachTaskEvents() {
      document.querySelectorAll('.task-check').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const id = parseInt(cb.dataset.id);
          const task = tasks.find(t => t.id === id);
          if(task) { task.completed = cb.checked; saveUserTasks(); renderTasks(); updateProgressBar(); }
        });
      });
      
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          if(confirm("Delete this task?")) {
            tasks = tasks.filter(t => t.id !== id);
            saveUserTasks(); renderTasks(); updateProgressBar();
          }
        });
      });
      
      document.querySelectorAll('.pin-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          const task = tasks.find(t => t.id === id);
          if(task) { task.pinned = !task.pinned; saveUserTasks(); renderTasks(); }
        });
      });
      
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          openEditModal(id);
        });
      });
    }
    
    function addNewTask() {
      const title = document.getElementById("taskTitle").value.trim();
      if(!title) return alert("Enter task title");
      const description = document.getElementById("taskDesc").value.trim();
      const category = document.getElementById("taskCategory").value;
      const priority = document.getElementById("taskPriority").value;
      const dueDate = document.getElementById("taskDueDate").value;
      const newTask = {
        id: Date.now(),
        title,
        description,
        category,
        priority,
        dueDate: dueDate || "",
        completed: false,
        pinned: false,
        createdAt: Date.now()
      };
      tasks.push(newTask);
      document.getElementById("taskTitle").value = "";
      document.getElementById("taskDesc").value = "";
      document.getElementById("taskDueDate").value = "";
      saveUserTasks();
      renderTasks();
      updateProgressBar();
    }
    
    function initFilters() {
      document.querySelectorAll("#statusFilters .filter-chip").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("#statusFilters .filter-chip").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentStatusFilter = btn.dataset.filter;
          renderTasks();
        });
      });
      
      document.querySelectorAll("#categoryFilters .filter-chip").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("#categoryFilters .filter-chip").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentCategoryFilter = btn.dataset.cat;
          renderTasks();
        });
      });
      
      searchInput.addEventListener("input", (e) => { searchQuery = e.target.value; renderTasks(); });
      sortSelect.addEventListener("change", (e) => { sortMode = e.target.value; renderTasks(); });
      clearCompletedBtn.addEventListener("click", () => { tasks = tasks.filter(t => !t.completed); saveUserTasks(); renderTasks(); updateProgressBar(); });
      clearAllBtn.addEventListener("click", () => { if(confirm("Delete ALL tasks permanently?")) { tasks = []; saveUserTasks(); renderTasks(); updateProgressBar(); } });
    }
    
    // Auth UI Handlers
    let isLoginMode = true;
    const authFormDiv = document.getElementById("authForm");
    
    function renderAuthForm() {
      if(isLoginMode) {
        authFormDiv.innerHTML = `
          <input type="email" id="loginEmail" class="auth-input" placeholder="Email address">
          <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
          <div id="authError" class="error-msg"></div>
          <button id="loginBtn" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
          <div class="switch-auth">Don't have an account? <span id="showSignup">Create account</span></div>
        `;
        document.getElementById("loginBtn").addEventListener("click", handleLogin);
        document.getElementById("showSignup").addEventListener("click", () => {
          isLoginMode = false;
          renderAuthForm();
        });
      } else {
        authFormDiv.innerHTML = `
          <input type="email" id="signupEmail" class="auth-input" placeholder="Email address">
          <input type="password" id="signupPassword" class="auth-input" placeholder="Password">
          <div id="authError" class="error-msg"></div>
          <button id="signupBtn" class="auth-btn"><i class="fas fa-user-plus"></i> Sign Up</button>
          <div class="switch-auth">Already have an account? <span id="showLogin">Login</span></div>
        `;
        document.getElementById("signupBtn").addEventListener("click", handleSignup);
        document.getElementById("showLogin").addEventListener("click", () => {
          isLoginMode = true;
          renderAuthForm();
        });
      }
    }
    
    function handleLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const errorDiv = document.getElementById("authError");
      if(!email || !password) {
        errorDiv.innerText = "Please enter email and password";
        return;
      }
      if(login(email, password)) {
        loadUserTasks();
        showAppScreen();
      } else {
        errorDiv.innerText = "Invalid email or password";
      }
    }
    
    function handleSignup() {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const errorDiv = document.getElementById("authError");
      if(!email || !password) {
        errorDiv.innerText = "Please enter email and password";
        return;
      }
      if(password.length < 4) {
        errorDiv.innerText = "Password must be at least 4 characters";
        return;
      }
      if(signup(email, password)) {
        loadUserTasks();
        showAppScreen();
      } else {
        errorDiv.innerText = "Email already exists";
      }
    }
    
    logoutBtn.addEventListener("click", logout);
    addBtn.addEventListener("click", addNewTask);
    
    // Make functions global for modal buttons
    window.openEditModal = openEditModal;
    window.closeEditModal = closeEditModal;
    window.saveEditTask = saveEditTask;
    
    // Initialize
    renderAuthForm();
    checkAutoLogin();
    initFilters();
    
    if("Notification" in window) Notification.requestPermission();
  </script>
</body>
</html>
